<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TrakX — Admin</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e3a5f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TrakX">
<link rel="apple-touch-icon" href="icon-192.png">
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}</script>
<link rel="stylesheet" href="assets/trakx.css">
</head>
<body data-page="admin" data-version="V0.11">
<script src="assets/nav.js" defer></script>

<main class="container">
  <h1 class="mb-2">Admin</h1>
  <p class="text-muted text-sm mb-4">Edit rates, zones, people. Auth wraps this (Richard).</p>

  <!-- Project Rates -->
  <section class="card">
    <div class="card-header">
      <span>Project rates</span>
      <span class="sub">All editable — applies to new entries only (history frozen).</span>
    </div>
    <form id="rates-form" class="grid-3">
      <div class="field-group">
        <label class="label" for="day_sell">Day sell rate $/h</label>
        <input id="day_sell" type="number" step="0.01" class="field field-sm">
      </div>
      <div class="field-group">
        <label class="label" for="night_sell">Night sell rate $/h</label>
        <input id="night_sell" type="number" step="0.01" class="field field-sm">
      </div>
      <div class="field-group">
        <label class="label" for="bonus_pct">Bonus %</label>
        <input id="bonus_pct" type="number" step="0.01" class="field field-sm">
      </div>
      <div class="field-group">
        <label class="label" for="travel_cost">Travel cost $/km</label>
        <input id="travel_cost" type="number" step="0.01" class="field field-sm">
      </div>
      <div class="field-group">
        <label class="label" for="travel_sell">Travel sell $/km</label>
        <input id="travel_sell" type="number" step="0.01" class="field field-sm">
      </div>
      <div class="field-group">
        <label class="label" for="mat_markup">Materials markup %</label>
        <input id="mat_markup" type="number" step="0.01" class="field field-sm">
      </div>
      <div class="field-group">
        <label class="label" for="accom_cost">Accom cost $/night</label>
        <input id="accom_cost" type="number" step="0.01" class="field field-sm">
      </div>
      <div class="field-group">
        <label class="label" for="accom_sell">Accom sell $/night</label>
        <input id="accom_sell" type="number" step="0.01" class="field field-sm">
      </div>
      <div class="field-group">
        <label class="label" for="eq_markup">Equipment markup %</label>
        <input id="eq_markup" type="number" step="0.01" class="field field-sm">
      </div>
      <div class="field-group">
        <label class="label" for="day_start">Day starts at hour</label>
        <input id="day_start" type="number" min="0" max="23" class="field field-sm">
      </div>
      <div class="field-group">
        <label class="label" for="day_end">Day ends at hour</label>
        <input id="day_end" type="number" min="0" max="23" class="field field-sm">
      </div>
      <div class="field-group">
        <label class="label" for="lunch_min">Lunch break (min)</label>
        <input id="lunch_min" type="number" min="0" class="field field-sm">
      </div>
      <div class="field-group">
        <label class="label" for="lunch_thresh">Lunch threshold (h)</label>
        <input id="lunch_thresh" type="number" step="0.25" class="field field-sm">
      </div>
      <div style="grid-column: 1 / -1" class="flex items-center gap-3 mt-2">
        <button type="submit" class="btn btn-primary">Save rates</button>
        <span id="rates-msg" class="text-sm"></span>
      </div>
    </form>
    <div class="field-help mt-3">
      NZ Employment Law (Holidays Act): &gt; 4h = 1 paid 10min rest; &gt; 6h = 2 paid 10min rests + 1 unpaid 30min meal break.
    </div>
  </section>

  <!-- Zones -->
  <section class="card">
    <div class="card-header">
      <span>Zones</span>
      <button id="add-zone" class="btn btn-blue btn-sm">+ Add zone</button>
    </div>
    <div id="zones-rows"></div>
  </section>

  <!-- People -->
  <section class="card">
    <div class="card-header">
      <span>People + rates</span>
      <button id="add-person" class="btn btn-blue btn-sm">+ Add person</button>
    </div>
    <div id="people-rows"></div>
  </section>

  <!-- Companies -->
  <section class="card">
    <div class="card-header">
      <span>Companies</span>
      <button id="add-company" class="btn btn-blue btn-sm">+ Add company</button>
    </div>
    <div id="companies-rows"></div>
  </section>
</main>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const SUPABASE_URL = 'https://uhodycdbkwocvptiffks.supabase.co';
const sb = createClient(SUPABASE_URL, 'sb_publishable_TKWfAttrdywsm1BOMUMNlw_FjMolZO5');
const c2d = c => (c / 100).toFixed(2);
const d2c = d => Math.round(parseFloat(d) * 100);

let projectId = null;
let companies = [];
let people = [];
let zones = [];

async function callAdmin(body) {
  const r = await fetch(`${SUPABASE_URL}/functions/v1/trakx-admin`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const j = await r.json();
  if (!j.ok) throw new Error(j.error || 'failed');
  return j;
}

async function loadAll() {
  const { data: project } = await sb.from('trakx_projects').select('id').eq('slug','fonterra-m26').single();
  projectId = project.id;

  const { data: pr } = await sb.from('trakx_project_rates').select('*').eq('project_id', projectId).single();
  if (pr) {
    document.getElementById('day_sell').value     = c2d(pr.day_sell_rate_cents);
    document.getElementById('night_sell').value   = c2d(pr.night_sell_rate_cents);
    document.getElementById('bonus_pct').value    = pr.bonus_pct;
    document.getElementById('travel_cost').value  = c2d(pr.travel_cost_per_km_cents);
    document.getElementById('travel_sell').value  = c2d(pr.travel_sell_per_km_cents);
    document.getElementById('mat_markup').value   = pr.materials_markup_pct;
    document.getElementById('accom_cost').value   = c2d(pr.accom_cost_per_night_cents);
    document.getElementById('accom_sell').value   = c2d(pr.accom_sell_per_night_cents);
    document.getElementById('eq_markup').value    = pr.equipment_markup_pct;
    document.getElementById('day_start').value    = pr.day_start_hour;
    document.getElementById('day_end').value      = pr.day_end_hour;
    document.getElementById('lunch_min').value    = pr.lunch_break_minutes;
    document.getElementById('lunch_thresh').value = pr.lunch_break_threshold_hours;
  }

  const { data: zoneData } = await sb.from('trakx_zones').select('*').eq('project_id', projectId).order('display_order');
  zones = zoneData || [];
  renderZones();

  const { data: companyData } = await sb.from('trakx_companies').select('*').order('name');
  companies = companyData || [];
  renderCompanies();

  const { data: peopleData } = await sb.from('trakx_people').select('*').order('name');
  people = peopleData || [];
  const { data: rates } = await sb.from('trakx_person_rates')
    .select('person_id, day_pay_rate_cents, night_pay_rate_cents, effective_from')
    .order('effective_from', { ascending: false });
  const latest = {};
  for (const r of (rates || [])) if (!latest[r.person_id]) latest[r.person_id] = r;
  const { data: assigns } = await sb.from('trakx_project_people').select('person_id').eq('project_id', projectId);
  const assignedIds = new Set((assigns || []).map(a => a.person_id));
  for (const p of people) {
    p.latest_rate = latest[p.id];
    p.assigned = assignedIds.has(p.id);
  }
  renderPeople();
}

document.getElementById('rates-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = document.getElementById('rates-msg');
  msg.textContent = 'Saving…'; msg.className = 'text-sm text-muted';
  try {
    await callAdmin({
      op: 'update_project_rates',
      project_id: projectId,
      day_sell_rate_cents:        d2c(document.getElementById('day_sell').value),
      night_sell_rate_cents:      d2c(document.getElementById('night_sell').value),
      bonus_pct:                  parseFloat(document.getElementById('bonus_pct').value),
      travel_cost_per_km_cents:   d2c(document.getElementById('travel_cost').value),
      travel_sell_per_km_cents:   d2c(document.getElementById('travel_sell').value),
      materials_markup_pct:       parseFloat(document.getElementById('mat_markup').value),
      accom_cost_per_night_cents: d2c(document.getElementById('accom_cost').value),
      accom_sell_per_night_cents: d2c(document.getElementById('accom_sell').value),
      equipment_markup_pct:       parseFloat(document.getElementById('eq_markup').value),
      day_start_hour:             parseInt(document.getElementById('day_start').value, 10),
      day_end_hour:               parseInt(document.getElementById('day_end').value, 10),
      lunch_break_minutes:        parseInt(document.getElementById('lunch_min').value, 10),
      lunch_break_threshold_hours:parseFloat(document.getElementById('lunch_thresh').value),
    });
    msg.textContent = '✓ Saved'; msg.className = 'text-sm text-green';
  } catch (e) {
    msg.textContent = '⚠ ' + e.message; msg.className = 'text-sm text-red';
  }
});

function renderZones() {
  document.getElementById('zones-rows').innerHTML = `
    <div style="overflow-x:auto"><table class="table">
      <thead><tr>
        <th>Name</th><th>NetSuite #</th><th>PO #</th>
        <th class="num">Target $</th><th class="num">Order</th><th></th><th></th>
      </tr></thead>
      <tbody>
        ${zones.map(z => `
          <tr data-id="${z.id}">
            <td><input class="field field-sm" value="${z.name||''}" data-f="name" style="min-width:140px"></td>
            <td><input class="field field-sm" value="${z.netsuite_project_id||''}" data-f="netsuite_project_id" style="min-width:100px"></td>
            <td><input class="field field-sm" value="${z.po_number||''}" data-f="po_number" style="min-width:100px"></td>
            <td class="num"><input class="field field-sm num" type="number" step="1" value="${z.revenue_target_cents ? c2d(z.revenue_target_cents) : ''}" data-f="revenue_target" style="min-width:90px"></td>
            <td class="num"><input class="field field-sm num" type="number" value="${z.display_order ?? 0}" data-f="display_order" style="min-width:60px"></td>
            <td><button class="btn btn-primary btn-sm" data-act="save">Save</button></td>
            <td><button class="btn btn-danger btn-sm" data-act="del">Delete</button></td>
          </tr>
        `).join('')}
      </tbody>
    </table></div>
  `;
  document.querySelectorAll('#zones-rows [data-act]').forEach(b => b.addEventListener('click', zoneAction));
}
async function zoneAction(e) {
  const row = e.target.closest('[data-id]');
  const id  = row.dataset.id;
  const get = f => row.querySelector(`[data-f="${f}"]`).value;
  try {
    if (e.target.dataset.act === 'del') {
      if (!confirm('Delete this zone? (Will fail if any entries are linked.)')) return;
      await callAdmin({ op: 'delete_zone', zone_id: id });
    } else {
      await callAdmin({
        op: 'upsert_zone',
        zone_id: id.startsWith('new-') ? null : id,
        project_id: projectId,
        name: get('name'),
        netsuite_project_id: get('netsuite_project_id'),
        po_number: get('po_number'),
        revenue_target_cents: d2c(get('revenue_target') || '0'),
        display_order: parseInt(get('display_order') || '0', 10),
      });
    }
    await loadAll();
  } catch (err) { alert(err.message); }
}
document.getElementById('add-zone').addEventListener('click', () => {
  zones.push({ id: 'new-' + Date.now(), name: '', display_order: zones.length });
  renderZones();
});

function renderCompanies() {
  document.getElementById('companies-rows').innerHTML = `
    <div style="overflow-x:auto"><table class="table">
      <thead><tr><th>Name</th><th>Type</th><th></th></tr></thead>
      <tbody>
        ${companies.map(c => `
          <tr data-id="${c.id}">
            <td><input class="field field-sm" value="${c.name}" data-f="name" style="min-width:180px"></td>
            <td><label class="check"><input type="checkbox" ${c.is_internal ? 'checked' : ''} data-f="is_internal"> Internal (NGL)</label></td>
            <td><button class="btn btn-primary btn-sm" data-act="save">Save</button></td>
          </tr>
        `).join('')}
      </tbody>
    </table></div>
  `;
  document.querySelectorAll('#companies-rows [data-act="save"]').forEach(b => b.addEventListener('click', companySave));
}
async function companySave(e) {
  const row = e.target.closest('[data-id]');
  const id  = row.dataset.id;
  try {
    await callAdmin({
      op: 'upsert_company',
      company_id: id.startsWith('new-') ? null : id,
      name: row.querySelector('[data-f="name"]').value,
      is_internal: row.querySelector('[data-f="is_internal"]').checked,
    });
    await loadAll();
  } catch (err) { alert(err.message); }
}
document.getElementById('add-company').addEventListener('click', () => {
  companies.push({ id: 'new-' + Date.now(), name: '', is_internal: false });
  renderCompanies();
});

function renderPeople() {
  const companyOptions = companies.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  document.getElementById('people-rows').innerHTML = `
    <div style="overflow-x:auto"><table class="table">
      <thead><tr>
        <th>Name</th><th>Company</th>
        <th class="num">Day $/h</th><th class="num">Night $/h</th>
        <th class="text-center">On project</th>
        <th></th><th></th>
      </tr></thead>
      <tbody>
        ${people.map(p => `
          <tr data-id="${p.id}">
            <td><input class="field field-sm" value="${p.name||''}" data-f="name" style="min-width:160px"></td>
            <td>
              <select class="field field-sm" data-f="company_id" style="min-width:140px">
                ${companyOptions.replace(`value="${p.company_id}"`, `value="${p.company_id}" selected`)}
              </select>
            </td>
            <td class="num"><input class="field field-sm num" type="number" step="0.01" value="${p.latest_rate ? c2d(p.latest_rate.day_pay_rate_cents) : ''}" data-f="day_pay" style="min-width:80px"></td>
            <td class="num"><input class="field field-sm num" type="number" step="0.01" value="${p.latest_rate ? c2d(p.latest_rate.night_pay_rate_cents) : ''}" data-f="night_pay" style="min-width:80px"></td>
            <td class="text-center"><input type="checkbox" ${p.assigned ? 'checked' : ''} data-f="assigned" style="width:18px;height:18px"></td>
            <td><button class="btn btn-primary btn-sm" data-act="save">Save</button></td>
            <td><button class="btn btn-secondary btn-sm" data-act="rate" title="Push new effective-today rate">+Rate</button></td>
          </tr>
        `).join('')}
      </tbody>
    </table></div>
  `;
  document.querySelectorAll('#people-rows [data-act]').forEach(b => b.addEventListener('click', personAction));
}
async function personAction(e) {
  const row = e.target.closest('[data-id]');
  const id  = row.dataset.id;
  const get = f => row.querySelector(`[data-f="${f}"]`);
  try {
    if (e.target.dataset.act === 'rate') {
      await callAdmin({
        op: 'set_person_rate',
        person_id: id,
        effective_from: new Date().toISOString().slice(0,10),
        day_pay_rate_cents:   d2c(get('day_pay').value),
        night_pay_rate_cents: d2c(get('night_pay').value),
      });
    } else {
      const res = await callAdmin({
        op: 'upsert_person',
        person_id: id.startsWith('new-') ? null : id,
        name: get('name').value,
        company_id: get('company_id').value,
      });
      const pid = res.id;
      const dayPay = d2c(get('day_pay').value);
      const nightPay = d2c(get('night_pay').value);
      const p = people.find(x => x.id === id);
      if (!p?.latest_rate
          || p.latest_rate.day_pay_rate_cents !== dayPay
          || p.latest_rate.night_pay_rate_cents !== nightPay) {
        await callAdmin({
          op: 'set_person_rate',
          person_id: pid,
          effective_from: new Date().toISOString().slice(0,10),
          day_pay_rate_cents: dayPay,
          night_pay_rate_cents: nightPay,
        });
      }
      await callAdmin({
        op: 'assign_person',
        project_id: projectId,
        person_id: pid,
        assigned: get('assigned').checked,
      });
    }
    await loadAll();
  } catch (err) { alert(err.message); }
}
document.getElementById('add-person').addEventListener('click', () => {
  people.push({ id: 'new-' + Date.now(), name: '', company_id: companies[0]?.id, assigned: true });
  renderPeople();
});

loadAll();
</script>
</body>
</html>
