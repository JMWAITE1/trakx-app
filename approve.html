<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ProjectX — Approve</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e3a5f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ProjectX">
<link rel="apple-touch-icon" href="icon-192.png">
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}</script>
<link rel="stylesheet" href="assets/projectx.css">
</head>
<body data-page="approve" data-version="V1.17">
<script src="assets/nav.js" defer></script>

<main class="container">
  <div class="flex items-baseline justify-between mb-2 gap-3">
    <h1>Pending approvals</h1>
    <a href="index.html" class="btn btn-ghost btn-sm" style="flex-shrink:0">← Back</a>
  </div>
  <div class="card card-tight mb-3 flex items-center gap-3" style="flex-wrap:wrap">
    <label class="label" for="pm-name" style="margin-bottom:0">PM name</label>
    <input id="pm-name" class="field field-sm" style="max-width:200px" placeholder="who's approving">
    <button id="approve-all" class="btn btn-success btn-sm" style="margin-left:auto">Approve all visible</button>
    <span id="count" class="text-muted text-sm"></span>
  </div>

  <div class="card card-tight mb-3" style="display:flex;flex-wrap:wrap;gap:8px;align-items:center">
    <label style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)">From <input id="f-from" type="date" class="field" style="min-height:30px;padding:4px 8px;font-size:13px;width:auto"></label>
    <label style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)">To <input id="f-to" type="date" class="field" style="min-height:30px;padding:4px 8px;font-size:13px;width:auto"></label>
    <label style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)">Contractor <select id="f-company" class="field" style="min-height:30px;padding:4px 8px;font-size:13px;width:auto;min-width:140px"><option value="">All</option></select></label>
    <label style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)">Person <select id="f-person" class="field" style="min-height:30px;padding:4px 8px;font-size:13px;width:auto;min-width:140px"><option value="">All</option></select></label>
    <label style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)">Zone <select id="f-zone" class="field" style="min-height:30px;padding:4px 8px;font-size:13px;width:auto;min-width:130px"><option value="">All</option></select></label>
    <button id="f-clear" class="btn btn-ghost btn-sm" style="margin-left:auto">Clear</button>
  </div>

  <div id="list" class="flex" style="flex-direction:column;gap:14px"></div>
</main>

<script src="assets/projectx-auth.js"></script>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
await window.__projectxReady;
const SUPABASE_URL = 'https://uhodycdbkwocvptiffks.supabase.co';
const sb = createClient(SUPABASE_URL, 'sb_publishable_TKWfAttrdywsm1BOMUMNlw_FjMolZO5');

const $list  = document.getElementById('list');
const $count = document.getElementById('count');
const $pm    = document.getElementById('pm-name');
const fmt = c => '$' + (Math.round(c / 100)).toLocaleString();
let allRows = [];

async function load() {
  $list.innerHTML = '<div class="loading">Loading…</div>';
  const { data, error } = await sb
    .from('v_projectx_line_totals')
    .select('id, type, date, person_name, company_name, zone_name, start_time, finish_time, total_hours, work_description, comments, materials_description, po_number, total_cost_cents, sell_price_cents')
    .eq('approved', false)
    .order('date', { ascending: false });
  if (error) { $list.innerHTML = '<div class="empty">Error: ' + error.message + '</div>'; return; }
  allRows = data || [];
  // Populate filter dropdowns
  const cos = [...new Set(allRows.map(r => r.company_name))].sort();
  const zns = [...new Set(allRows.map(r => r.zone_name))].sort();
  const pps = [...new Set(allRows.map(r => r.person_name))].sort();
  document.getElementById('f-company').innerHTML = '<option value="">All contractors</option>' + cos.map(c => `<option>${c}</option>`).join('');
  document.getElementById('f-person').innerHTML  = '<option value="">All people</option>'      + pps.map(p => `<option>${p}</option>`).join('');
  document.getElementById('f-zone').innerHTML    = '<option value="">All zones</option>'       + zns.map(z => `<option>${z}</option>`).join('');
  render();
}

function filtered() {
  const from = document.getElementById('f-from').value;
  const to   = document.getElementById('f-to').value;
  const co   = document.getElementById('f-company').value;
  const pers = document.getElementById('f-person').value;
  const zone = document.getElementById('f-zone').value;
  return allRows.filter(r => {
    if (from && r.date < from) return false;
    if (to   && r.date > to)   return false;
    if (co   && r.company_name !== co)   return false;
    if (pers && r.person_name  !== pers) return false;
    if (zone && r.zone_name    !== zone) return false;
    return true;
  });
}

function render() {
  const rows = filtered();
  if (!rows.length) {
    $list.innerHTML = allRows.length
      ? '<div class="empty">No entries match the current filters.</div>'
      : '<div class="empty"><svg class="icon-xl" viewBox="0 0 24 24" stroke-width="1.5" stroke="var(--green)" fill="none" style="margin:0 auto 8px;display:block"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>All caught up — no pending entries.</div>';
    $count.textContent = allRows.length ? `0 of ${allRows.length}` : '0 pending';
    return;
  }
  $count.textContent = rows.length === allRows.length ? `${rows.length} pending` : `${rows.length} of ${allRows.length} pending`;

  const byDate = {};
  for (const r of rows) (byDate[r.date] ||= []).push(r);

  $list.innerHTML = Object.entries(byDate).map(([date, rows]) => `
    <div class="card" style="padding:0">
      <div style="padding:10px 14px; background:var(--gray-50); border-bottom:1px solid var(--border); border-radius:12px 12px 0 0; font-weight:600; font-size:13px;">
        ${date} <span class="text-muted text-xs" style="font-weight:400; margin-left:6px">${rows.length} entries</span>
      </div>
      <div class="divide-y">
        ${rows.map(r => {
          const detail = r.type === 'hours'
            ? `${r.start_time?.slice(0,5)}–${r.finish_time?.slice(0,5)} (${(+r.total_hours).toFixed(2)}h)`
            : r.type === 'materials'
              ? (r.po_number ? `PO ${r.po_number}` : '')
              : '';
          const desc = r.work_description || r.materials_description || '';
          const typeBadge = `<span class="badge badge-${r.type === 'hours' ? 'blue' : r.type === 'materials' ? 'gold' : 'amber'}">${r.type}</span>`;
          return `
          <div class="flex items-start gap-3" style="padding:12px 14px" data-id="${r.id}">
            <div style="flex:1;min-width:0">
              <div class="flex items-baseline gap-2" style="flex-wrap:wrap">
                <span class="font-semibold">${r.person_name}</span>
                ${typeBadge}
                <span class="text-muted text-xs">${r.company_name} • ${r.zone_name}${detail ? ' • ' + detail : ''}</span>
              </div>
              ${desc ? `<div class="text-sm text-gray-700 mt-1">"${desc.replace(/"/g,'&quot;')}"</div>` : ''}
              ${r.comments ? `<div class="text-xs text-amber mt-1">⚠ ${r.comments.replace(/"/g,'&quot;')}</div>` : ''}
            </div>
            <div class="text-right" style="min-width:90px">
              <div class="text-xs text-muted">cost ${fmt(r.total_cost_cents)}</div>
              <div class="font-semibold">${fmt(r.sell_price_cents)}</div>
            </div>
            <button class="btn btn-success btn-sm approve-btn" data-id="${r.id}">Approve</button>
          </div>`;
        }).join('')}
      </div>
    </div>
  `).join('');

  document.querySelectorAll('.approve-btn').forEach(btn =>
    btn.addEventListener('click', () => approve([btn.dataset.id]))
  );
}

async function approve(ids) {
  const pm = $pm.value.trim();
  if (!pm) {
    $pm.focus();
    $pm.style.borderColor = 'var(--red)';
    setTimeout(() => { $pm.style.borderColor = ''; }, 1500);
    return;
  }
  for (const id of ids) {
    const r = await fetch(`${SUPABASE_URL}/functions/v1/projectx-approve`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ entry_id: id, approved: true, approved_by: pm }),
    });
    const body = await r.json();
    if (!body.ok) { alert(body.error || 'failed on ' + id); break; }
  }
  await load();
}

document.getElementById('approve-all').addEventListener('click', () => {
  const rows = filtered();
  if (!rows.length) return;
  if (!confirm(`Approve all ${rows.length} visible pending entries?`)) return;
  approve(rows.map(r => r.id));
});

['f-from','f-to','f-company','f-person','f-zone'].forEach(id => document.getElementById(id).addEventListener('change', render));
document.getElementById('f-clear').addEventListener('click', () => {
  ['f-from','f-to','f-company','f-person','f-zone'].forEach(id => document.getElementById(id).value = '');
  render();
});

load();
</script>
</body>
</html>
