<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ProjectX — Submit</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e3a5f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ProjectX">
<link rel="apple-touch-icon" href="icon-192.png">
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}</script>
<link rel="stylesheet" href="assets/projectx.css">
<style>
  /* Zone pick: stack of tap-target buttons. Radio under the hood for
     accessibility + form semantics, label styled as a card. */
  .zone-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
  }
  .zone-grid input[type="radio"] {
    position: absolute;
    opacity: 0;
    pointer-events: none;
  }
  .zone-grid label {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px 10px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: white;
    color: var(--ink);
    font-size: 14px;
    font-weight: 500;
    text-align: center;
    cursor: pointer;
    transition: all 0.12s;
    line-height: 1.3;
    user-select: none;
  }
  .zone-grid label:hover { border-color: var(--blue); }
  .zone-grid input[type="radio"]:checked + label {
    background: var(--navy);
    border-color: var(--navy);
    color: white;
    font-weight: 600;
  }
</style>
</head>
<body data-page="submit" data-version="V1.17">
<script src="assets/nav.js" defer></script>

<main class="container-narrow">
  <div class="mb-4">
    <h1 id="project-name">Submitting…</h1>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="hours">Hours</button>
    <button class="tab" data-tab="materials">Materials</button>
    <button class="tab" data-tab="accom">Accom &amp; Travel</button>
  </div>

  <form id="projectx-form" class="card">
    <div class="field-group">
      <label class="label" for="person">Your name</label>
      <select id="person" class="field" required></select>
    </div>
    <div class="field-group">
      <label class="label" for="date">Date</label>
      <input id="date" type="date" class="field" required>
    </div>
    <div class="field-group">
      <label class="label">Zone</label>
      <div id="zone-radios" class="zone-grid"></div>
    </div>

    <!-- Hours tab -->
    <div class="tab-fields" data-fields="hours">
      <div class="grid-2 mb-3">
        <div>
          <label class="label" for="start_time">Start time</label>
          <select id="start_time" class="field"><option value="">— pick —</option></select>
        </div>
        <div>
          <label class="label" for="finish_time">Finish time</label>
          <select id="finish_time" class="field"><option value="">— pick —</option></select>
        </div>
      </div>
      <div class="field-group">
        <label class="label" for="work_description">What you did</label>
        <textarea id="work_description" class="field" rows="3" placeholder="e.g. Top coat blower room floor, cladding sill and scale"></textarea>
      </div>
    </div>

    <!-- Materials tab -->
    <div class="tab-fields" data-fields="materials" hidden>
      <div class="field-group">
        <label class="label" for="materials_description">Materials</label>
        <textarea id="materials_description" class="field" rows="2" placeholder="e.g. 2x 4L kit Rustbond, 3x 10L Carboguard 636"></textarea>
      </div>
      <div class="grid-2 mb-3">
        <div>
          <label class="label" for="materials_cost">Cost ($)</label>
          <input id="materials_cost" type="number" step="0.01" class="field" inputmode="decimal">
        </div>
        <div>
          <label class="label" for="po_number">PO # <span class="text-muted text-xs">(optional)</span></label>
          <input id="po_number" type="text" class="field" placeholder="WD44…">
        </div>
      </div>
      <div class="field-group">
        <label class="label" for="receipt">Photo of receipt <span class="text-muted text-xs">(optional)</span></label>
        <input id="receipt" type="file" accept="image/*" capture="environment" class="field">
      </div>
    </div>

    <!-- Accom & Travel tab -->
    <div class="tab-fields" data-fields="accom" hidden>
      <div class="field-group">
        <label class="label" for="accom_nights">Nights stayed</label>
        <input id="accom_nights" type="number" min="0" class="field" inputmode="numeric" value="0">
      </div>
      <div class="field-group">
        <label class="label" for="travel_kms">Travel km <span class="text-muted text-xs">(optional)</span></label>
        <input id="travel_kms" type="number" min="0" step="0.1" class="field" inputmode="decimal">
      </div>
    </div>

    <!-- Comments common to all tabs -->
    <div class="field-group">
      <label class="label" for="comments">Comments <span class="text-muted text-xs">(optional)</span></label>
      <input id="comments" type="text" class="field" placeholder="Anything to flag">
    </div>

    <button type="submit" id="submit-btn" class="btn btn-blue btn-lg btn-block mt-3">Submit</button>
    <div id="submit-msg" class="text-center text-sm mt-3"></div>
  </form>

</main>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const SUPABASE_URL = 'https://uhodycdbkwocvptiffks.supabase.co';
const SUPABASE_KEY = 'sb_publishable_TKWfAttrdywsm1BOMUMNlw_FjMolZO5';
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const slug = new URLSearchParams(location.search).get('p') || 'fonterra-m26';
let currentTab = 'hours';
let projectId  = null;

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    document.querySelectorAll('.tab-fields').forEach(div => {
      div.hidden = div.dataset.fields !== currentTab;
    });
  });
});

async function load() {
  document.getElementById('date').valueAsDate = new Date();

  // Try the slug from the URL first. If it doesn't match, fall back to the
  // first active project (since we only run one project at a time today).
  let { data: projects, error: pErr } = await sb
    .from('projectx_projects')
    .select('id, display_name, customer_name, status')
    .eq('slug', slug)
    .limit(1);
  if (pErr) console.error('project lookup by slug failed', pErr);
  let project = projects && projects[0];
  if (!project) {
    console.warn(`No project with slug="${slug}" — falling back to first active project`);
    const fallback = await sb
      .from('projectx_projects')
      .select('id, display_name, customer_name, status')
      .eq('status', 'active')
      .limit(1);
    if (fallback.error) console.error('fallback project lookup failed', fallback.error);
    project = fallback.data && fallback.data[0];
  }
  if (!project) {
    document.getElementById('project-name').textContent = 'No active project';
    document.getElementById('submit-btn').disabled = true;
    return;
  }
  projectId = project.id;
  document.getElementById('project-name').textContent = project.display_name;
  const ctx = document.querySelector('.projectx-context');
  if (ctx) ctx.textContent = project.display_name;

  const { data: zones } = await sb
    .from('projectx_zones')
    .select('id, name')
    .eq('project_id', project.id)
    .eq('status', 'active')
    .order('display_order');
  document.getElementById('zone-radios').innerHTML =
    (zones || []).map(z => `
      <div style="position:relative">
        <input type="radio" name="zone" id="zone-${z.id}" value="${z.id}" required>
        <label for="zone-${z.id}">${z.name}</label>
      </div>
    `).join('');

  // Populate time dropdowns: every 15min from 00:00 → 23:45.
  function buildTimeOptions() {
    const opts = ['<option value="">— pick —</option>'];
    for (let h = 0; h < 24; h++) {
      for (let m = 0; m < 60; m += 15) {
        const v = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
        opts.push(`<option value="${v}">${v}</option>`);
      }
    }
    return opts.join('');
  }
  document.getElementById('start_time').innerHTML  = buildTimeOptions();
  document.getElementById('finish_time').innerHTML = buildTimeOptions();

  // Fetch people for the dropdown via plain queries (no embedded relations).
  // Embedded-relation joins relied on PostgREST's auto-detected FK relationships,
  // which were brittle after the trakx→projectx table renames. Plain queries
  // are slower but never silently return empty.
  const { data: links, error: linkErr } = await sb
    .from('projectx_project_people')
    .select('person_id')
    .eq('project_id', project.id);
  if (linkErr) console.error('project_people fetch failed', linkErr);
  const personIds = (links || []).map(l => l.person_id);

  let people = [];
  if (personIds.length) {
    const { data: rawPeople } = await sb
      .from('projectx_people')
      .select('id, name, company_id, active')
      .in('id', personIds)
      .eq('active', true);
    const { data: companies } = await sb
      .from('projectx_companies')
      .select('id, name');
    const companyById = Object.fromEntries((companies || []).map(c => [c.id, c.name]));
    people = (rawPeople || [])
      .map(p => ({ id: p.id, name: p.name, company: companyById[p.company_id] || '' }))
      .sort((a, b) => a.name.localeCompare(b.name));
  }

  const $person = document.getElementById('person');
  if (!people.length) {
    $person.innerHTML = '<option value="">— no people assigned to this project —</option>';
  } else {
    $person.innerHTML =
      '<option value="">— pick name —</option>' +
      people.map(p => `<option value="${p.id}">${p.name} (${p.company})</option>`).join('');
  }
}

document.getElementById('projectx-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = document.getElementById('submit-msg');
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Submitting…';
  msg.textContent = '';
  msg.className = 'text-center text-sm mt-3';

  const payload = {
    project_id: projectId,
    type:       currentTab,
    zone_id:    (document.querySelector('input[name="zone"]:checked') || {}).value || '',
    person_id:  document.getElementById('person').value,
    date:       document.getElementById('date').value,
  };
  if (currentTab === 'hours') {
    const startT  = document.getElementById('start_time').value;
    const finishT = document.getElementById('finish_time').value;
    payload.start_time       = startT;
    payload.finish_time      = finishT;
    // Auto-detect cross-midnight: if finish is earlier than start, it must
    // be the next day. (No checkbox — subbies don't think in clock cycles.)
    payload.finish_next_day  = !!(startT && finishT && finishT < startT);
    payload.work_description = document.getElementById('work_description').value;
  } else if (currentTab === 'materials') {
    payload.materials_description = document.getElementById('materials_description').value;
    payload.materials_cost        = parseFloat(document.getElementById('materials_cost').value || '0');
    payload.po_number             = document.getElementById('po_number').value;
  } else if (currentTab === 'accom') {
    payload.accom_nights = parseInt(document.getElementById('accom_nights').value || '0', 10);
    payload.travel_kms   = parseFloat(document.getElementById('travel_kms').value || '0');
  }
  payload.comments = document.getElementById('comments').value;

  try {
    const r = await fetch(`${SUPABASE_URL}/functions/v1/projectx-submit`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload),
    });
    const body = await r.json();
    if (!r.ok || !body.ok) throw new Error(body.error || `HTTP ${r.status}`);

    msg.className = 'text-center text-sm mt-3 text-green';
    msg.textContent = '✓ Submitted — thanks!';
    document.getElementById('start_time').value = '';
    document.getElementById('finish_time').value = '';
    document.getElementById('work_description').value = '';
    document.getElementById('materials_description').value = '';
    document.getElementById('materials_cost').value = '';
    document.getElementById('po_number').value = '';
    document.getElementById('accom_nights').value = '0';
    document.getElementById('travel_kms').value = '';
    document.getElementById('comments').value = '';
  } catch (e) {
    msg.className = 'text-center text-sm mt-3 text-red';
    msg.textContent = '⚠ ' + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Submit';
  }
});

load();
</script>
</body>
</html>
