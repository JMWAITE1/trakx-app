<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>TrakX — Submit</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e3a5f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TrakX">
<link rel="apple-touch-icon" href="icon-192.png">
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}</script>
<link rel="stylesheet" href="assets/trakx.css">
</head>
<body data-page="submit" data-version="V0.11">
<script src="assets/nav.js" defer></script>

<main class="container-narrow">
  <div class="mb-4">
    <h1 id="project-name">Submitting…</h1>
    <div class="text-muted text-sm" id="project-sub">Loading project…</div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="hours">Hours</button>
    <button class="tab" data-tab="materials">Materials</button>
    <button class="tab" data-tab="accom">Accom &amp; Travel</button>
  </div>

  <form id="trakx-form" class="card">
    <div class="field-group">
      <label class="label" for="person">Your name</label>
      <select id="person" class="field" required></select>
    </div>
    <div class="grid-2 mb-3">
      <div>
        <label class="label" for="date">Date</label>
        <input id="date" type="date" class="field" required>
      </div>
      <div>
        <label class="label" for="zone">Zone</label>
        <select id="zone" class="field" required></select>
      </div>
    </div>

    <!-- Hours tab -->
    <div class="tab-fields" data-fields="hours">
      <div class="grid-2 mb-3">
        <div>
          <label class="label" for="start_time">Start time</label>
          <input id="start_time" type="time" class="field">
        </div>
        <div>
          <label class="label" for="finish_time">Finish time</label>
          <input id="finish_time" type="time" class="field">
        </div>
      </div>
      <label class="check mb-3">
        <input id="finish_next_day" type="checkbox">
        Finish is on the next day (crosses midnight)
      </label>
      <div class="field-group">
        <label class="label" for="work_description">What you did</label>
        <textarea id="work_description" class="field" rows="3" placeholder="e.g. Top coat blower room floor, cladding sill and scale"></textarea>
      </div>
    </div>

    <!-- Materials tab -->
    <div class="tab-fields" data-fields="materials" hidden>
      <div class="field-group">
        <label class="label" for="materials_description">Materials</label>
        <textarea id="materials_description" class="field" rows="2" placeholder="e.g. 2x 4L kit Rustbond, 3x 10L Carboguard 636"></textarea>
      </div>
      <div class="grid-2 mb-3">
        <div>
          <label class="label" for="materials_cost">Cost ($)</label>
          <input id="materials_cost" type="number" step="0.01" class="field" inputmode="decimal">
        </div>
        <div>
          <label class="label" for="po_number">PO # <span class="text-muted text-xs">(optional)</span></label>
          <input id="po_number" type="text" class="field" placeholder="WD44…">
        </div>
      </div>
      <div class="field-group">
        <label class="label" for="receipt">Photo of receipt <span class="text-muted text-xs">(optional)</span></label>
        <input id="receipt" type="file" accept="image/*" capture="environment" class="field">
        <div class="field-help">Upload not yet wired — photo will save with the entry in a future update.</div>
      </div>
    </div>

    <!-- Accom & Travel tab -->
    <div class="tab-fields" data-fields="accom" hidden>
      <div class="field-group">
        <label class="label" for="accom_nights">Nights stayed</label>
        <input id="accom_nights" type="number" min="0" class="field" inputmode="numeric" value="0">
      </div>
      <div class="field-group">
        <label class="label" for="travel_kms">Travel km <span class="text-muted text-xs">(optional)</span></label>
        <input id="travel_kms" type="number" min="0" step="0.1" class="field" inputmode="decimal">
      </div>
      <div class="field-help">If you didn't stay overnight but drove a long way, log km here. Either field is fine on its own.</div>
    </div>

    <!-- Comments common to all tabs -->
    <div class="field-group">
      <label class="label" for="comments">Comments <span class="text-muted text-xs">(optional)</span></label>
      <input id="comments" type="text" class="field" placeholder="Anything to flag">
    </div>

    <button type="submit" id="submit-btn" class="btn btn-blue btn-lg btn-block mt-3">Submit</button>
    <div id="submit-msg" class="text-center text-sm mt-3"></div>
  </form>

  <p class="trakx-footer">TrakX • <a href="javascript:location.reload()">Refresh</a></p>
</main>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const SUPABASE_URL = 'https://uhodycdbkwocvptiffks.supabase.co';
const SUPABASE_KEY = 'sb_publishable_TKWfAttrdywsm1BOMUMNlw_FjMolZO5';
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const slug = new URLSearchParams(location.search).get('p') || 'fonterra-m26';
let currentTab = 'hours';
let projectId  = null;

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    document.querySelectorAll('.tab-fields').forEach(div => {
      div.hidden = div.dataset.fields !== currentTab;
    });
  });
});

async function load() {
  document.getElementById('date').valueAsDate = new Date();

  const { data: project, error: pErr } = await sb
    .from('trakx_projects')
    .select('id, display_name, customer_name')
    .eq('slug', slug)
    .single();
  if (pErr || !project) {
    document.getElementById('project-name').textContent = 'Project not found';
    document.getElementById('project-sub').textContent  = 'Check the link.';
    document.getElementById('submit-btn').disabled = true;
    return;
  }
  projectId = project.id;
  document.getElementById('project-name').textContent = project.display_name;
  document.getElementById('project-sub').textContent  = `Daily entry for ${project.customer_name}`;
  const ctx = document.querySelector('.trakx-context');
  if (ctx) ctx.textContent = project.display_name;

  const { data: zones } = await sb
    .from('trakx_zones')
    .select('id, name')
    .eq('project_id', project.id)
    .eq('status', 'active')
    .order('display_order');
  document.getElementById('zone').innerHTML =
    `<option value="">— pick zone —</option>` +
    (zones || []).map(z => `<option value="${z.id}">${z.name}</option>`).join('');

  const { data: links } = await sb
    .from('trakx_project_people')
    .select('person_id, trakx_people(id, name, trakx_companies(name))')
    .eq('project_id', project.id);
  const people = (links || [])
    .map(l => l.trakx_people)
    .filter(Boolean)
    .sort((a, b) => a.name.localeCompare(b.name));
  document.getElementById('person').innerHTML =
    `<option value="">— pick name —</option>` +
    people.map(p => `<option value="${p.id}">${p.name} (${p.trakx_companies?.name || ''})</option>`).join('');
}

document.getElementById('trakx-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = document.getElementById('submit-msg');
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Submitting…';
  msg.textContent = '';
  msg.className = 'text-center text-sm mt-3';

  const payload = {
    project_id: projectId,
    type:       currentTab,
    zone_id:    document.getElementById('zone').value,
    person_id:  document.getElementById('person').value,
    date:       document.getElementById('date').value,
  };
  if (currentTab === 'hours') {
    payload.start_time       = document.getElementById('start_time').value;
    payload.finish_time      = document.getElementById('finish_time').value;
    payload.finish_next_day  = document.getElementById('finish_next_day').checked;
    payload.work_description = document.getElementById('work_description').value;
  } else if (currentTab === 'materials') {
    payload.materials_description = document.getElementById('materials_description').value;
    payload.materials_cost        = parseFloat(document.getElementById('materials_cost').value || '0');
    payload.po_number             = document.getElementById('po_number').value;
  } else if (currentTab === 'accom') {
    payload.accom_nights = parseInt(document.getElementById('accom_nights').value || '0', 10);
    payload.travel_kms   = parseFloat(document.getElementById('travel_kms').value || '0');
  }
  payload.comments = document.getElementById('comments').value;

  try {
    const r = await fetch(`${SUPABASE_URL}/functions/v1/trakx-submit`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload),
    });
    const body = await r.json();
    if (!r.ok || !body.ok) throw new Error(body.error || `HTTP ${r.status}`);

    msg.className = 'text-center text-sm mt-3 text-green';
    msg.textContent = '✓ Submitted — thanks!';
    document.getElementById('start_time').value = '';
    document.getElementById('finish_time').value = '';
    document.getElementById('finish_next_day').checked = false;
    document.getElementById('work_description').value = '';
    document.getElementById('materials_description').value = '';
    document.getElementById('materials_cost').value = '';
    document.getElementById('po_number').value = '';
    document.getElementById('accom_nights').value = '0';
    document.getElementById('travel_kms').value = '';
    document.getElementById('comments').value = '';
  } catch (e) {
    msg.className = 'text-center text-sm mt-3 text-red';
    msg.textContent = '⚠ ' + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Submit';
  }
});

load();
</script>
</body>
</html>
