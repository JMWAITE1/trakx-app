<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TrakX — Accounts Receivable</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e3a5f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TrakX">
<link rel="apple-touch-icon" href="icon-192.png">
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}</script>
<link rel="stylesheet" href="assets/trakx.css">
</head>
<body data-page="ar" data-version="V0.11">
<script src="assets/nav.js" defer></script>

<main class="container">
  <div class="flex items-baseline justify-between mb-2 gap-3">
    <h1>Accounts Receivable</h1>
    <button id="export-csv" class="btn btn-secondary btn-sm">Export CSV</button>
  </div>
  <p class="text-muted text-sm mb-4">What to invoice the customer. Approved entries only.</p>

  <div id="content"></div>
  <div id="grand" class="card flex items-baseline justify-between mt-4" style="background:#f0f5fa;border-left:4px solid var(--gold)"></div>
</main>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const sb = createClient(
  'https://uhodycdbkwocvptiffks.supabase.co',
  'sb_publishable_TKWfAttrdywsm1BOMUMNlw_FjMolZO5'
);
const fmt = c => '$' + (Math.round(c / 100)).toLocaleString();

const { data, error } = await sb.from('v_trakx_ar').select('*').order('date');
const $  = document.getElementById('content');
const $g = document.getElementById('grand');

if (error) { $.innerHTML = '<div class="empty">Error: ' + error.message + '</div>'; }
else if (!data?.length) { $.innerHTML = '<div class="empty"><div class="icon">📭</div>No approved entries yet.</div>'; }
else {
  const groups = {};
  for (const r of data) (groups[r.zone_name] ||= []).push(r);
  let grandTotal = 0;
  $.innerHTML = Object.entries(groups).map(([zone, rows]) => {
    const total = rows.reduce((a, r) => a + r.sell_price_cents, 0);
    grandTotal += total;
    return `
      <details class="card" style="padding:0;overflow:hidden" open>
        <summary style="padding:12px 16px; cursor:pointer; display:flex; justify-content:space-between; align-items:baseline; font-weight:600; background:var(--gray-50); border-bottom:1px solid var(--border)">
          <span>${zone} <span class="text-muted text-xs" style="font-weight:400;margin-left:6px">${rows.length} lines</span></span>
          <span style="font-variant-numeric:tabular-nums">${fmt(total)}</span>
        </summary>
        <div style="overflow-x:auto">
          <table class="table">
            <thead>
              <tr>
                <th>Date</th><th>Name</th><th>Company</th><th>Type</th>
                <th class="num">Labour</th><th class="num">Travel</th>
                <th class="num">Accom</th><th class="num">Materials</th>
                <th class="num">Total</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(r => `
                <tr>
                  <td>${r.date}</td>
                  <td><div class="font-semibold">${r.person_name}</div>${(r.work_description || r.materials_description) ? `<div class="text-xs text-muted">${(r.work_description || r.materials_description).replace(/"/g,'&quot;').slice(0,60)}</div>` : ''}</td>
                  <td class="text-muted">${r.company_name}</td>
                  <td><span class="badge badge-${r.type==='hours'?'blue':r.type==='materials'?'gold':'amber'}">${r.type}</span></td>
                  <td class="num">${fmt(r.labour_sell_cents)}</td>
                  <td class="num">${fmt(r.travel_sell_cents)}</td>
                  <td class="num">${fmt(r.accom_sell_cents)}</td>
                  <td class="num">${fmt(r.materials_sell_cents)}</td>
                  <td class="num font-semibold">${fmt(r.sell_price_cents)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </details>
    `;
  }).join('');
  $g.innerHTML = `<span class="font-semibold text-lg">Total to invoice</span><span class="text-lg font-bold" style="font-variant-numeric:tabular-nums">${fmt(grandTotal)}</span>`;
}

document.getElementById('export-csv').addEventListener('click', () => {
  if (!data?.length) return;
  const cols = ['date','zone_name','person_name','company_name','type','work_description','materials_description',
                'labour_sell_cents','travel_sell_cents','accom_sell_cents',
                'materials_sell_cents','equipment_sell_cents','sell_price_cents'];
  const csv = [cols.join(',')].concat(
    data.map(r => cols.map(c => {
      let v = r[c]; if (v === null || v === undefined) v = '';
      if (typeof v === 'string' && (v.includes(',') || v.includes('"'))) v = `"${v.replace(/"/g,'""')}"`;
      return v;
    }).join(','))
  ).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `trakx-ar-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
});
</script>
</body>
</html>
