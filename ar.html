<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ProjectX — Accounts Receivable</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e3a5f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ProjectX">
<link rel="apple-touch-icon" href="icon-192.png">
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}</script>
<link rel="stylesheet" href="assets/projectx.css">
<style>
  .ar-table.hide-company .col-company,
  .ar-table.hide-type .col-type,
  .ar-table.hide-labour .col-labour,
  .ar-table.hide-travel .col-travel,
  .ar-table.hide-accom .col-accom,
  .ar-table.hide-materials .col-materials { display: none; }
</style>
</head>
<body data-page="ar" data-version="V1.17">
<script src="assets/nav.js" defer></script>

<main class="container">
  <div class="flex items-baseline justify-between mb-2 gap-3">
    <h1>Accounts Receivable</h1>
    <div class="flex items-center gap-2" style="flex-shrink:0; position:relative">
      <button id="toggle-all" class="btn btn-secondary btn-sm">Expand all</button>
      <button id="cols-btn" class="btn btn-secondary btn-sm">Columns ▾</button>
      <div id="cols-menu" hidden style="position:absolute;top:calc(100% + 4px);right:0;z-index:50;background:white;border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow-lg);padding:10px 12px;min-width:200px;display:flex;flex-direction:column;gap:6px;font-size:13px">
        <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;color:var(--muted);padding-bottom:6px;margin-bottom:4px;border-bottom:1px solid var(--line)">Show columns</div>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" data-col="company"> Company</label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" data-col="type"> Type</label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" data-col="labour"> Labour</label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" data-col="travel"> Travel</label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" data-col="accom"> Accom</label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" data-col="materials"> Materials</label>
      </div>
      <button id="export-csv" class="btn btn-secondary btn-sm">Export CSV</button>
      <a href="index.html" class="btn btn-ghost btn-sm">← Back</a>
    </div>
  </div>
  <div class="card card-tight mb-3" style="display:flex;flex-wrap:wrap;gap:8px;align-items:center">
    <label style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)">From <input id="f-from" type="date" class="field" style="min-height:30px;padding:4px 8px;font-size:13px;width:auto"></label>
    <label style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)">To <input id="f-to" type="date" class="field" style="min-height:30px;padding:4px 8px;font-size:13px;width:auto"></label>
    <label style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)">Zone <select id="f-zone" class="field" style="min-height:30px;padding:4px 8px;font-size:13px;width:auto;min-width:140px"><option value="">All</option></select></label>
    <label style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)">Contractor <select id="f-company" class="field" style="min-height:30px;padding:4px 8px;font-size:13px;width:auto;min-width:160px"><option value="">All</option></select></label>
    <label style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)">Person <select id="f-person" class="field" style="min-height:30px;padding:4px 8px;font-size:13px;width:auto;min-width:160px"><option value="">All</option></select></label>
    <button id="f-clear" class="btn btn-ghost btn-sm" style="margin-left:auto">Clear</button>
  </div>

  <div id="content"></div>
  <div id="grand" class="card flex items-baseline justify-between mt-4" style="background:#f0f5fa;border-left:4px solid var(--gold)"></div>
</main>

<script src="assets/projectx-auth.js"></script>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
await window.__projectxReady;
const sb = createClient(
  'https://uhodycdbkwocvptiffks.supabase.co',
  'sb_publishable_TKWfAttrdywsm1BOMUMNlw_FjMolZO5'
);
const fmt = c => '$' + (Math.round(c / 100)).toLocaleString();

// Pulling from v_projectx_line_totals (the underlying view) so we get total_hours
// for the per-zone header summary. Equivalent to v_projectx_ar's filter.
const { data: allData, error } = await sb
  .from('v_projectx_line_totals')
  .select('id, type, date, person_name, company_name, zone_name, work_description, materials_description, total_hours, labour_sell_cents, travel_sell_cents, accom_sell_cents, materials_sell_cents, equipment_sell_cents, sell_price_cents, approved')
  .eq('approved', true)
  .gt('sell_price_cents', 0)
  .order('date');
let data = allData || [];
const $  = document.getElementById('content');
const $g = document.getElementById('grand');

const zones = [...new Set(data.map(r => r.zone_name))].sort();
const companies = [...new Set(data.map(r => r.company_name))].sort();
const people = [...new Set(data.map(r => r.person_name))].sort();
document.getElementById('f-zone').innerHTML = '<option value="">All zones</option>' + zones.map(z => `<option>${z}</option>`).join('');
document.getElementById('f-company').innerHTML = '<option value="">All contractors</option>' + companies.map(c => `<option>${c}</option>`).join('');
document.getElementById('f-person').innerHTML = '<option value="">All people</option>' + people.map(p => `<option>${p}</option>`).join('');

function filtered() {
  const from = document.getElementById('f-from').value;
  const to = document.getElementById('f-to').value;
  const zone = document.getElementById('f-zone').value;
  const co = document.getElementById('f-company').value;
  const pers = document.getElementById('f-person').value;
  return data.filter(r => {
    if (from && r.date < from) return false;
    if (to   && r.date > to)   return false;
    if (zone && r.zone_name    !== zone) return false;
    if (co   && r.company_name !== co)   return false;
    if (pers && r.person_name  !== pers) return false;
    return true;
  });
}

function render() {
  const rows = filtered();
  if (error) { $.innerHTML = '<div class="empty">Error: ' + error.message + '</div>'; $g.innerHTML=''; return; }
  if (!rows.length) { $.innerHTML = '<div class="empty"><svg class="icon-xl" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" fill="none" style="opacity:0.4;margin:0 auto 8px;display:block"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 13.5h3.86a2.25 2.25 0 0 1 2.012 1.244l.256.512a2.25 2.25 0 0 0 2.013 1.244h3.218a2.25 2.25 0 0 0 2.013-1.244l.256-.512a2.25 2.25 0 0 1 2.013-1.244h3.859m-19.5.338V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18v-4.162c0-.224-.034-.447-.1-.661L19.24 5.338a2.25 2.25 0 0 0-2.15-1.588H6.911a2.25 2.25 0 0 0-2.15 1.588L2.35 13.177a2.25 2.25 0 0 0-.1.661Z"/></svg>No entries match the current filters.</div>'; $g.innerHTML=''; return; }
  const groups = {};
  for (const r of rows) (groups[r.zone_name] ||= []).push(r);
  let grandTotal = 0;
  $.innerHTML = Object.entries(groups).map(([zone, rows]) => {
    const total    = rows.reduce((a, r) => a + r.sell_price_cents, 0);
    const totalHrs = rows.reduce((a, r) => a + (+r.total_hours || 0), 0);
    grandTotal += total;
    return `
      <details class="card" style="padding:0;overflow:hidden">
        <summary style="padding:10px 16px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; font-weight:600; font-size:14px; background:var(--navy); color:#fff; letter-spacing:-0.005em">
          <span style="display:flex;align-items:center;gap:8px">
            <span class="chevron">▶</span>
            ${zone}
            <span style="font-weight:400;font-size:12px;color:rgba(255,255,255,0.7)">${rows.length} lines${totalHrs > 0 ? ` · ${Math.round(totalHrs)}h` : ''}</span>
          </span>
          <span style="font-variant-numeric:tabular-nums">${fmt(total)}</span>
        </summary>
        <div style="overflow-x:auto">
          <table class="table ar-table">
            <thead>
              <tr>
                <th>Date</th><th>Name</th>
                <th class="col-company">Company</th>
                <th class="col-type">Type</th>
                <th class="num col-labour">Labour</th>
                <th class="num col-travel">Travel</th>
                <th class="num col-accom">Accom</th>
                <th class="num col-materials">Materials</th>
                <th class="num">Total</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(r => `
                <tr>
                  <td>${r.date}</td>
                  <td><div class="font-semibold">${r.person_name}</div>${(r.work_description || r.materials_description) ? `<div class="text-xs text-muted">${(r.work_description || r.materials_description).replace(/"/g,'&quot;').slice(0,60)}</div>` : ''}</td>
                  <td class="text-muted col-company">${r.company_name}</td>
                  <td class="col-type"><span class="badge badge-${r.type==='hours'?'blue':r.type==='materials'?'gold':'amber'}">${r.type}</span></td>
                  <td class="num col-labour">${fmt(r.labour_sell_cents)}</td>
                  <td class="num col-travel">${fmt(r.travel_sell_cents)}</td>
                  <td class="num col-accom">${fmt(r.accom_sell_cents)}</td>
                  <td class="num col-materials">${fmt(r.materials_sell_cents)}</td>
                  <td class="num font-semibold">${fmt(r.sell_price_cents)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </details>
    `;
  }).join('');
  const anyFilter = ['f-from','f-to','f-zone','f-company','f-person'].some(id => document.getElementById(id).value);
  $g.innerHTML = `<span class="font-semibold text-lg">Total to invoice${anyFilter ? ' (filtered)' : ''}</span><span class="text-lg font-bold" style="font-variant-numeric:tabular-nums">${fmt(grandTotal)}</span>`;
  if (typeof applyCols === 'function') applyCols();
}

// Toggle-all button. Filters cause re-render which resets to collapsed.
let allExpanded = false;
document.getElementById('toggle-all').addEventListener('click', () => {
  allExpanded = !allExpanded;
  document.querySelectorAll('#content details').forEach(d => d.open = allExpanded);
  document.getElementById('toggle-all').textContent = allExpanded ? 'Collapse all' : 'Expand all';
});

['f-from','f-to','f-zone','f-company','f-person'].forEach(id => document.getElementById(id).addEventListener('change', () => {
  allExpanded = false;
  document.getElementById('toggle-all').textContent = 'Expand all';
  render();
}));
document.getElementById('f-clear').addEventListener('click', () => {
  ['f-from','f-to','f-zone','f-company','f-person'].forEach(id => document.getElementById(id).value = '');
  allExpanded = false;
  document.getElementById('toggle-all').textContent = 'Expand all';
  render();
});

// ── Column picker ──────────────────────────────────────────────────
const COLS_KEY = 'projectx-ar-cols';
const HIDEABLE = ['company','type','labour','travel','accom','materials'];
function loadCols() { try { return JSON.parse(localStorage.getItem(COLS_KEY) || '{}'); } catch { return {}; } }
function saveCols(p) { localStorage.setItem(COLS_KEY, JSON.stringify(p)); }
function applyCols() {
  const p = loadCols();
  document.querySelectorAll('table.ar-table').forEach(t => {
    HIDEABLE.forEach(c => t.classList.toggle('hide-' + c, p[c] === false));
  });
  document.querySelectorAll('#cols-menu input[data-col]').forEach(cb => {
    cb.checked = p[cb.dataset.col] !== false;
  });
}

render();
applyCols();

document.getElementById('cols-btn').addEventListener('click', e => {
  e.stopPropagation();
  const menu = document.getElementById('cols-menu');
  menu.hidden = !menu.hidden;
});
document.addEventListener('click', e => {
  const menu = document.getElementById('cols-menu');
  if (!menu.hidden && !menu.contains(e.target) && e.target.id !== 'cols-btn') menu.hidden = true;
});
document.getElementById('cols-menu').addEventListener('change', e => {
  const cb = e.target;
  if (!cb.dataset.col) return;
  const p = loadCols();
  p[cb.dataset.col] = cb.checked;
  saveCols(p);
  applyCols();
});

document.getElementById('export-csv').addEventListener('click', () => {
  const rows = filtered();
  if (!rows.length) return;
  const cols = ['date','zone_name','person_name','company_name','type','work_description','materials_description',
                'labour_sell_cents','travel_sell_cents','accom_sell_cents',
                'materials_sell_cents','equipment_sell_cents','sell_price_cents'];
  const csv = [cols.join(',')].concat(
    rows.map(r => cols.map(c => {
      let v = r[c]; if (v === null || v === undefined) v = '';
      if (typeof v === 'string' && (v.includes(',') || v.includes('"'))) v = `"${v.replace(/"/g,'""')}"`;
      return v;
    }).join(','))
  ).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `projectx-ar-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
});
</script>
</body>
</html>
