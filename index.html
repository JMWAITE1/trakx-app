<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ProjectX — Fonterra Maungaturoto 26</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e3a5f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ProjectX">
<link rel="apple-touch-icon" href="icon-192.png">
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}</script>
<link rel="stylesheet" href="assets/projectx.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  /* Dashboard layout: KPI strip + 2 charts + sidebar (NetSuite list +
     shared chart legend). No chrome banners — the top nav already
     covers branding. */
  /* Single-row grid: a fixed row height forces every column to be exactly
     the same height, regardless of how tall each column's own content is.
     Without this, the implicit row sizes to natural content max and small
     subpixel differences in padding/borders show up. */
  .dash-grid {
    display: grid;
    grid-template-columns: 190px 1fr 1fr 190px;
    grid-template-rows: 360px;
    gap: 14px;
    margin-bottom: 16px;
  }
  @media (max-width: 1100px) { .dash-grid { grid-template-columns: 1fr 1fr; grid-template-rows: auto; } }
  @media (max-width: 700px)  { .dash-grid { grid-template-columns: 1fr; grid-template-rows: auto; } }

  /* KPI cards distribute evenly down the column so the strip's overall
     height matches the chart cards next to it. */
  .kpi-strip { display: flex; flex-direction: column; gap: 8px; }
  .kpi-row {
    background: white;
    border-radius: var(--r);
    padding: 8px 12px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .kpi-row .kpi-label { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
  .kpi-row .kpi-value { font-size: 17px; font-weight: 600; color: var(--ink); margin-top: 2px; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
  .kpi-row .kpi-sub   { font-size: 10px; color: var(--muted); margin-top: 1px; }

  .chart-card {
    background: white;
    border-radius: var(--r-lg);
    padding: 14px 16px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .chart-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    text-align: center;
    padding-bottom: 8px;
    margin-bottom: 10px;
    border-bottom: 1px solid var(--line);
  }
  .chart-wrap { position: relative; flex: 1; min-height: 0; }

  /* Side column: cards sit at their natural content height (no forced
     equal split). Stopping the equal-split squeeze that was clipping the
     Chart Series legend's 5th item. Empty space lands at the bottom of
     the column if the side stack is shorter than the chart row. */
  .side-col { display: flex; flex-direction: column; gap: 8px; }
  .side-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 8px 12px;
    box-shadow: var(--shadow-sm);
    flex: 0 0 auto;
  }
  .side-title { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; padding-bottom: 6px; margin-bottom: 6px; border-bottom: 1px solid var(--line); }
  .ns-row { font-size: 11px; color: var(--muted); padding: 2px 0; display: block; }
  .ns-row strong { color: var(--navy); margin-right: 6px; font-variant-numeric: tabular-nums; }

  .legend-list { display: flex; flex-direction: column; gap: 4px; }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--gray-700); }
  .legend-swatch { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

  .zone-table-card { background: white; border-radius: var(--r-lg); border: 1px solid var(--border); box-shadow: var(--shadow-sm); overflow: hidden; }
  .zone-table { width: 100%; border-collapse: collapse; }
  .zone-table th { background: var(--gray-50); padding: 8px 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); text-align: left; border-bottom: 1px solid var(--border); }
  .zone-table th.num, .zone-table td.num { text-align: right; }
  .zone-table td { padding: 9px 12px; border-bottom: 1px solid var(--gray-100); font-size: 13px; font-variant-numeric: tabular-nums; }
  .zone-table tr:last-child td { border-bottom: none; }
  .zone-table td.zone-name { font-weight: 600; color: var(--navy); }
  .zone-table .actual-cell { font-weight: 700; }
  .zone-table .actual-cell.over { color: var(--red); }
</style>
</head>
<body data-page="dashboard" data-version="V1.17">
<script src="assets/nav.js" defer></script>

<main class="container">

  <div id="zone-alert-banner"></div>

  <div class="dash-grid">

    <!-- Left: vertical KPI strip -->
    <div class="kpi-strip" id="kpi-strip">
      <div class="kpi-row"><div class="kpi-label">Loading…</div></div>
    </div>

    <!-- Middle-left: Zone Summary -->
    <div class="chart-card">
      <div class="chart-title">Zone Summary</div>
      <div class="chart-wrap"><canvas id="chart-gp-by-plant"></canvas></div>
    </div>

    <!-- Middle-right: Total Summary -->
    <div class="chart-card">
      <div class="chart-title">Total Summary</div>
      <div class="chart-wrap"><canvas id="chart-total"></canvas></div>
    </div>

    <!-- Right: NetSuite + chart legend + submit shortcut -->
    <div class="side-col">
      <div class="side-card">
        <div class="side-title">NetSuite Projects</div>
        <div id="ns-list"></div>
      </div>
      <div class="side-card">
        <div class="side-title">Chart Series</div>
        <div class="legend-list" id="chart-legend"></div>
      </div>
      <div class="side-card">
        <div class="side-title">Submit</div>
        <div style="display:flex;flex-direction:column;gap:6px">
          <a href="submit.html?p=fonterra-m26" target="_blank" class="btn btn-secondary btn-sm" style="justify-content:flex-start">+ New entry</a>
          <button id="copy-subbie-link" class="btn btn-secondary btn-sm" style="justify-content:flex-start" title="Copy public submit link"><svg class="icon-sm" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" fill="none"><path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0 0 13.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 0 1-.75.75H9a.75.75 0 0 1-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 0 1-2.25 2.25H6.75A2.25 2.25 0 0 1 4.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 0 1 1.927-.184"/></svg> Copy subbie link</button>
          <span id="submit-hint" class="text-muted" style="font-size:11px;margin-top:2px;min-height:14px"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- Zone summary table -->
  <div class="zone-table-card mb-4">
    <table class="zone-table">
      <thead>
        <tr>
          <th>Zone</th>
          <th class="num">Total Costs</th>
          <th class="num">Total CM$</th>
          <th class="num">Target</th>
          <th class="num">Current</th>
          <th class="num">%</th>
        </tr>
      </thead>
      <tbody id="zone-tbody">
        <tr><td colspan="6" class="text-muted italic" style="text-align:center;padding:20px">Loading…</td></tr>
      </tbody>
    </table>
  </div>

  <div id="pending-banner" hidden></div>
</main>

<script src="assets/projectx-auth.js"></script>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
await window.__projectxReady;
const sb = createClient(
  'https://uhodycdbkwocvptiffks.supabase.co',
  'sb_publishable_TKWfAttrdywsm1BOMUMNlw_FjMolZO5'
);
const fmt = c => '$' + (Math.round(c / 100)).toLocaleString();
const pct = n => (n == null ? '—' : (+n).toFixed(0) + '%');

// NGL brand-aligned chart palette — refined a touch brighter so the
// bars read clearly without going back to cheap default-Chart.js look.
const SERIES = [
  { key: 'hours',  label: 'Total Hours',    color: '#94a3b8' },  // slate — neutral utility
  { key: 'costs',  label: 'Total Costs',    color: '#1e3a5f' },  // NGL navy — primary
  { key: 'gp',     label: 'Total CM$',      color: '#d4b370' },  // warmer gold — headline metric
  { key: 'target', label: 'Revenue Target', color: '#4c9a64' },  // brighter sage — the goal
  { key: 'actual', label: 'Revenue Actual', color: '#c64a3a' },  // rust red — the live state
];

const { data: zones } = await sb
  .from('v_projectx_zone_rollup')
  .select('*')
  .order('zone_name');

// Zone alert threshold: warn when zone is within X% of target (default 10).
// Read from the project_rates row for the active project.
let alertWithinPct = 10;
const { data: projForAlert } = await sb.from('projectx_projects').select('id').eq('slug','fonterra-m26').limit(1);
if (projForAlert && projForAlert[0]) {
  const { data: prArr } = await sb.from('projectx_project_rates').select('zone_alert_within_pct').eq('project_id', projForAlert[0].id).limit(1);
  if (prArr && prArr[0] && prArr[0].zone_alert_within_pct != null) alertWithinPct = +prArr[0].zone_alert_within_pct;
}
const alertAtPct = 100 - alertWithinPct;
const flagged = (zones || []).filter(z => z.revenue_target_cents > 0 && z.pct_complete >= alertAtPct);
const banner = document.getElementById('zone-alert-banner');
if (flagged.length) {
  // Split into "approaching" (close but under 100%) vs "over" (already past target).
  // Show over first since it's more urgent.
  const overZones        = flagged.filter(z => z.pct_complete >= 100).sort((a,b) => b.pct_complete - a.pct_complete);
  const approachingZones = flagged.filter(z => z.pct_complete <  100).sort((a,b) => b.pct_complete - a.pct_complete);
  const chip = (z, isOver) => `<a href="lines.html?zone=${encodeURIComponent(z.zone_name)}" style="display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;background:${isOver?'var(--red)':'var(--amber)'};color:#fff;font-weight:600;font-size:12px;text-decoration:none;margin:2px 4px 2px 0">${z.zone_name} · ${(+z.pct_complete).toFixed(0)}%</a>`;
  const items = overZones.map(z => chip(z, true)).concat(approachingZones.map(z => chip(z, false))).join('');

  // Title describes whichever cases are present; over-target leads if both.
  let title;
  if (overZones.length && approachingZones.length) {
    title = `${overZones.length} over target, ${approachingZones.length} approaching`;
  } else if (overZones.length) {
    title = `${overZones.length} ${overZones.length===1?'zone is':'zones are'} over target`;
  } else {
    title = `${approachingZones.length} ${approachingZones.length===1?'zone is':'zones are'} within ${alertWithinPct}% of target`;
  }

  // Severity: red if any zone is over target, amber if just approaching.
  const severe = overZones.length > 0;
  const tint   = severe ? 'var(--red)'    : 'var(--amber)';
  const bg     = severe ? 'var(--red-bg)' : 'var(--amber-bg)';
  const border = severe ? '#fca5a5'        : '#fcd34d';

  banner.innerHTML = `
    <div style="margin-bottom:14px;padding:10px 14px;background:${bg};border:1px solid ${border};border-left:3px solid ${tint};border-radius:var(--r-lg);display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <svg class="icon-lg" viewBox="0 0 24 24" stroke-width="1.5" stroke="${tint}" fill="none" style="flex-shrink:0"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"/></svg>
      <strong style="color:var(--ink)">${title}</strong>
      <div style="flex:1;min-width:200px">${items}</div>
    </div>`;
}

let totalRevenue = 0, totalCost = 0, totalGp = 0, totalTarget = 0, totalHours = 0;
for (const z of (zones || [])) {
  totalRevenue += z.revenue_actual_cents;
  totalCost    += z.total_cost_cents;
  totalGp      += z.gp_cents;
  totalTarget  += z.revenue_target_cents;
  totalHours   += +z.total_hours;
}
const totalGpPct = totalRevenue > 0 ? (100 * totalGp / totalRevenue) : 0;

// Cost breakdown for KPI strip
const { data: lines } = await sb.from('v_projectx_line_totals').select('labour_cost_cents, travel_cost_cents, accom_cost_cents, materials_cost_cents, equipment_cost_cents').eq('approved', true);
const tot = (lines || []).reduce((a, r) => ({
  labour:    a.labour    + r.labour_cost_cents,
  travel:    a.travel    + r.travel_cost_cents,
  accom:     a.accom     + r.accom_cost_cents,
  materials: a.materials + r.materials_cost_cents,
}), { labour:0, travel:0, accom:0, materials:0 });

document.getElementById('kpi-strip').innerHTML = [
  { label:'Revenue',        value:fmt(totalRevenue), sub:`of ${fmt(totalTarget)}` },
  { label:'Total Labour',   value:fmt(tot.labour),   sub:'' },
  { label:'Travel / Accom', value:fmt(tot.travel + tot.accom), sub:'' },
  { label:'Total Material', value:fmt(tot.materials), sub:'' },
  { label:'Total CM $',     value:fmt(totalGp),      sub:'' },
  { label:'Total CM %',     value:pct(totalGpPct),   sub:'' },
].map(k => `
  <div class="kpi-row">
    <div class="kpi-label">${k.label}</div>
    <div class="kpi-value">${k.value}</div>
    ${k.sub ? `<div class="kpi-sub">${k.sub}</div>` : ''}
  </div>
`).join('');

// NetSuite project list
const nsList = document.getElementById('ns-list');
const nsRows = (zones || []).map(z => z.netsuite_project_id ? `<span class="ns-row"><strong>${z.netsuite_project_id}</strong>${z.zone_name}</span>` : '').join('');
nsList.innerHTML = nsRows || '<span class="text-muted text-xs italic">No NetSuite links set</span>';

// Shared chart legend
document.getElementById('chart-legend').innerHTML = SERIES.map(s =>
  `<div class="legend-item"><span class="legend-swatch" style="background:${s.color}"></span>${s.label}</div>`
).join('');

// Zone table
const zoneTbody = document.getElementById('zone-tbody');
if (!zones?.length) {
  zoneTbody.innerHTML = '<tr><td colspan="6" class="text-muted italic" style="text-align:center;padding:20px">No zones.</td></tr>';
} else {
  zoneTbody.innerHTML = zones.map(z => {
    const over = z.revenue_actual_cents > z.revenue_target_cents;
    const drill = `lines.html?zone=${encodeURIComponent(z.zone_name)}`;
    return `
      <tr onclick="location.href='${drill}'" title="Click to drill into ${z.zone_name} entries" style="cursor:pointer">
        <td class="zone-name">${z.zone_name}</td>
        <td class="num">${fmt(z.total_cost_cents)}</td>
        <td class="num">${fmt(z.gp_cents)}</td>
        <td class="num">${fmt(z.revenue_target_cents)}</td>
        <td class="num actual-cell ${over ? 'over' : ''}">${fmt(z.revenue_actual_cents)}</td>
        <td class="num">${pct(z.pct_complete)}</td>
      </tr>
    `;
  }).join('');
}

// Shared Y-axis ceiling so the two charts line up visually — a $50k bar
// in the Zone Summary should sit at the same pixel height as a $50k slice
// of the Total Summary. Right chart sums always dominate, so use those.
const yMaxRaw = Math.max(totalCost, totalGp, totalTarget, totalRevenue) / 100;
// Round up to nearest $10k for tidy gridlines.
const yMax = Math.max(10000, Math.ceil(yMaxRaw / 10000) * 10000);

// Shared chart options — built-in legend disabled (we render our own in the sidebar)
// categoryPercentage + barPercentage keep bar widths consistent regardless of
// how many categories the chart has (so 1 zone or 6 zones look the same shape).
const baseOpts = {
  responsive: true, maintainAspectRatio: false,
  onHover: (e, els) => { e.native.target.style.cursor = els.length ? 'pointer' : 'default'; },
  plugins: {
    legend: { display: false },
    tooltip: {
      callbacks: {
        label: c => `${c.dataset.label}: ${c.dataset.label === 'Total Hours' ? Math.round(c.parsed.y) + ' h' : '$' + Math.round(c.parsed.y).toLocaleString()}`,
        afterBody: () => 'Click to drill into lines',
      },
    },
  },
  datasets: {
    bar: { categoryPercentage: 0.65, barPercentage: 0.9 },
  },
  scales: {
    y: {
      beginAtZero: true,
      max: yMax,
      grid: { color: '#eef1f5' },
      ticks: { font: { size: 10 }, color: '#6b7280', callback: v => v >= 1000 ? '$' + (v / 1000).toFixed(0) + 'k' : '$' + v },
    },
    x: {
      grid: { display: false },
      // maxRotation 0 keeps labels horizontal even when there are several
      // bars — multi-word zone names are passed as arrays below so Chart.js
      // wraps them onto two lines instead of slanting.
      ticks: { font: { size: 11 }, color: '#1f2937', autoSkip: false, maxRotation: 0, minRotation: 0 },
    },
  },
};

// CM$ by Zone — click a bar to open Lines filtered to that zone
const zoneLabels = (zones || []).map(z => z.zone_name);
// Split multi-word zone names on space so Chart.js stacks them onto two
// lines horizontally (matches the "Project total" chart's [['Project','total']] style).
const zoneLabelsDisplay = zoneLabels.map(name => name.split(' '));
new Chart(document.getElementById('chart-gp-by-plant').getContext('2d'), {
  type: 'bar',
  data: {
    labels: zoneLabelsDisplay,
    datasets: [
      { label: SERIES[0].label, data: zones.map(z => +z.total_hours),                 backgroundColor: SERIES[0].color },
      { label: SERIES[1].label, data: zones.map(z => z.total_cost_cents / 100),       backgroundColor: SERIES[1].color },
      { label: SERIES[2].label, data: zones.map(z => z.gp_cents / 100),               backgroundColor: SERIES[2].color },
      { label: SERIES[3].label, data: zones.map(z => z.revenue_target_cents / 100),   backgroundColor: SERIES[3].color },
      { label: SERIES[4].label, data: zones.map(z => z.revenue_actual_cents / 100),   backgroundColor: SERIES[4].color },
    ],
  },
  options: {
    ...baseOpts,
    onClick: (_, els) => {
      if (!els.length) return;
      location.href = `lines.html?zone=${encodeURIComponent(zoneLabels[els[0].index])}`;
    },
  },
});

// Total CM$ — click a bar to open Lines (all). Label as array → renders on
// two lines (Chart.js convention) so it sits balanced under the bars.
new Chart(document.getElementById('chart-total').getContext('2d'), {
  type: 'bar',
  data: {
    labels: [['Project', 'total']],
    datasets: [
      { label: SERIES[1].label, data: [totalCost     / 100], backgroundColor: SERIES[1].color },
      { label: SERIES[2].label, data: [totalGp       / 100], backgroundColor: SERIES[2].color },
      { label: SERIES[3].label, data: [totalTarget   / 100], backgroundColor: SERIES[3].color },
      { label: SERIES[4].label, data: [totalRevenue  / 100], backgroundColor: SERIES[4].color },
    ],
  },
  options: {
    ...baseOpts,
    // Single category — keep bars narrow so the chart doesn't look empty.
    datasets: { bar: { categoryPercentage: 0.45, barPercentage: 0.9 } },
    onClick: (_, els) => { if (els.length) location.href = 'lines.html'; },
  },
});

// Copy subbie link button
document.getElementById('copy-subbie-link').addEventListener('click', async () => {
  const url = location.origin + location.pathname.replace(/[^/]*$/, '') + 'submit.html?p=fonterra-m26';
  const hint = document.getElementById('submit-hint');
  try {
    await navigator.clipboard.writeText(url);
    hint.textContent = '✓ Copied';
    hint.style.color = 'var(--green)';
  } catch {
    hint.textContent = url + ' (copy manually)';
    hint.style.color = 'var(--muted)';
  }
  setTimeout(() => { hint.textContent = ''; }, 3500);
});

const { count } = await sb.from('projectx_entries').select('id', { count: 'exact', head: true }).eq('approved', false);
if (count && count > 0) {
  const b = document.getElementById('pending-banner');
  b.innerHTML = `
    <a href="approve.html" class="card flex items-center gap-3" style="background:var(--amber-bg);border-left:3px solid var(--amber);text-decoration:none">
      <svg class="icon-lg" viewBox="0 0 24 24" stroke-width="1.5" stroke="var(--amber)" fill="none" style="flex-shrink:0"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"/></svg>
      <div>
        <div class="font-semibold" style="color:var(--amber)">${count} pending approval${count > 1 ? 's' : ''}</div>
        <div class="text-xs text-muted">Click to review</div>
      </div>
    </a>`;
  b.hidden = false;
}
</script>
</body>
</html>
