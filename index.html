<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TrakX — Fonterra Maungaturoto 26</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e3a5f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TrakX">
<link rel="apple-touch-icon" href="icon-192.png">
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}</script>
<link rel="stylesheet" href="assets/trakx.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  /* Dashboard layout: KPI strip + 2 charts + sidebar (NetSuite list +
     shared chart legend). No chrome banners — the top nav already
     covers branding. */
  .dash-grid {
    display: grid;
    grid-template-columns: 220px 1fr 1fr 220px;
    gap: 16px;
    align-items: start;
    margin-bottom: 16px;
  }
  @media (max-width: 1100px) { .dash-grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 700px)  { .dash-grid { grid-template-columns: 1fr; } }

  .kpi-strip { display: flex; flex-direction: column; gap: 10px; }
  .kpi-row {
    background: white;
    border-radius: var(--r);
    padding: 10px 14px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
  }
  .kpi-row .kpi-label { font-size: 11px; color: var(--blue); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
  .kpi-row .kpi-value { font-size: 22px; font-weight: 800; color: var(--navy); margin-top: 2px; font-variant-numeric: tabular-nums; }
  .kpi-row .kpi-sub   { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .chart-card {
    background: white;
    border-radius: var(--r-lg);
    padding: 14px 16px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
    height: 100%;
    display: flex;
    flex-direction: column;
  }
  .chart-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--navy);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    text-align: center;
    padding-bottom: 8px;
    margin-bottom: 10px;
    border-bottom: 1px solid var(--line);
  }
  .chart-wrap { position: relative; flex: 1; min-height: 280px; }

  .side-col { display: flex; flex-direction: column; gap: 14px; }
  .side-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 12px 14px;
    box-shadow: var(--shadow-sm);
  }
  .side-title { font-size: 11px; font-weight: 700; color: var(--navy); text-transform: uppercase; letter-spacing: 0.06em; padding-bottom: 8px; margin-bottom: 8px; border-bottom: 1px solid var(--line); }
  .ns-row { font-size: 12px; color: var(--muted); padding: 4px 0; display: block; }
  .ns-row strong { color: var(--navy); margin-right: 6px; font-variant-numeric: tabular-nums; }

  .legend-list { display: flex; flex-direction: column; gap: 6px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--gray-700); }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }

  .zone-table-card { background: white; border-radius: var(--r-lg); border: 1px solid var(--border); box-shadow: var(--shadow-sm); overflow: hidden; }
  .zone-table { width: 100%; border-collapse: collapse; }
  .zone-table th { background: var(--gray-50); padding: 8px 12px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--navy); text-align: left; border-bottom: 1px solid var(--border); }
  .zone-table th.num, .zone-table td.num { text-align: right; }
  .zone-table td { padding: 9px 12px; border-bottom: 1px solid var(--gray-100); font-size: 13px; font-variant-numeric: tabular-nums; }
  .zone-table tr:last-child td { border-bottom: none; }
  .zone-table td.zone-name { font-weight: 600; color: var(--navy); }
  .zone-table .actual-cell { font-weight: 700; }
  .zone-table .actual-cell.over { color: var(--red); }
</style>
</head>
<body data-page="dashboard" data-version="V0.17">
<script src="assets/nav.js" defer></script>

<main class="container">

  <div class="dash-grid">

    <!-- Left: vertical KPI strip -->
    <div class="kpi-strip" id="kpi-strip">
      <div class="kpi-row"><div class="kpi-label">Loading…</div></div>
    </div>

    <!-- Middle-left: GP$ by Plant -->
    <div class="chart-card">
      <div class="chart-title">GP$ by Plant</div>
      <div class="chart-wrap"><canvas id="chart-gp-by-plant"></canvas></div>
    </div>

    <!-- Middle-right: Total GP$ -->
    <div class="chart-card">
      <div class="chart-title">Total GP$</div>
      <div class="chart-wrap"><canvas id="chart-total"></canvas></div>
    </div>

    <!-- Right: NetSuite + shared chart legend -->
    <div class="side-col">
      <div class="side-card">
        <div class="side-title">NetSuite Projects</div>
        <div id="ns-list"></div>
      </div>
      <div class="side-card">
        <div class="side-title">Chart Series</div>
        <div class="legend-list" id="chart-legend"></div>
      </div>
    </div>
  </div>

  <!-- Zone summary table -->
  <div class="zone-table-card mb-4">
    <table class="zone-table">
      <thead>
        <tr>
          <th>Zone</th>
          <th class="num">Total Costs</th>
          <th class="num">Total GP$</th>
          <th class="num">Target</th>
          <th class="num">Current</th>
          <th class="num">%</th>
        </tr>
      </thead>
      <tbody id="zone-tbody">
        <tr><td colspan="6" class="text-muted italic" style="text-align:center;padding:20px">Loading…</td></tr>
      </tbody>
    </table>
  </div>

  <div id="pending-banner" hidden></div>
</main>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const sb = createClient(
  'https://uhodycdbkwocvptiffks.supabase.co',
  'sb_publishable_TKWfAttrdywsm1BOMUMNlw_FjMolZO5'
);
const fmt = c => '$' + (Math.round(c / 100)).toLocaleString();
const pct = n => (n == null ? '—' : (+n).toFixed(0) + '%');

const SERIES = [
  { key: 'hours',  label: 'Total Hours',    color: '#3b82f6' },
  { key: 'costs',  label: 'Total Costs',    color: '#1e40af' },
  { key: 'gp',     label: 'Total GP$',      color: '#fbbf24' },
  { key: 'target', label: 'Revenue Target', color: '#10b981' },
  { key: 'actual', label: 'Revenue Actual', color: '#ef4444' },
];

const { data: zones } = await sb
  .from('v_trakx_zone_rollup')
  .select('*')
  .order('zone_name');

let totalRevenue = 0, totalCost = 0, totalGp = 0, totalTarget = 0, totalHours = 0;
for (const z of (zones || [])) {
  totalRevenue += z.revenue_actual_cents;
  totalCost    += z.total_cost_cents;
  totalGp      += z.gp_cents;
  totalTarget  += z.revenue_target_cents;
  totalHours   += +z.total_hours;
}
const totalGpPct = totalRevenue > 0 ? (100 * totalGp / totalRevenue) : 0;

// Cost breakdown for KPI strip
const { data: lines } = await sb.from('v_trakx_line_totals').select('labour_cost_cents, travel_cost_cents, accom_cost_cents, materials_cost_cents, equipment_cost_cents').eq('approved', true);
const tot = (lines || []).reduce((a, r) => ({
  labour:    a.labour    + r.labour_cost_cents,
  travel:    a.travel    + r.travel_cost_cents,
  accom:     a.accom     + r.accom_cost_cents,
  materials: a.materials + r.materials_cost_cents,
}), { labour:0, travel:0, accom:0, materials:0 });

document.getElementById('kpi-strip').innerHTML = [
  { label:'Turnover',       value:fmt(totalRevenue), sub:`of ${fmt(totalTarget)}` },
  { label:'Total Labour',   value:fmt(tot.labour),   sub:'' },
  { label:'Travel / Accom', value:fmt(tot.travel + tot.accom), sub:'' },
  { label:'Total Material', value:fmt(tot.materials), sub:'' },
  { label:'Total GP $',     value:fmt(totalGp),      sub:'' },
  { label:'Total GP %',     value:pct(totalGpPct),   sub:'' },
].map(k => `
  <div class="kpi-row">
    <div class="kpi-label">${k.label}</div>
    <div class="kpi-value">${k.value}</div>
    ${k.sub ? `<div class="kpi-sub">${k.sub}</div>` : ''}
  </div>
`).join('');

// NetSuite project list
const nsList = document.getElementById('ns-list');
const nsRows = (zones || []).map(z => z.netsuite_project_id ? `<span class="ns-row"><strong>${z.netsuite_project_id}</strong>${z.zone_name}</span>` : '').join('');
nsList.innerHTML = nsRows || '<span class="text-muted text-xs italic">No NetSuite links set</span>';

// Shared chart legend
document.getElementById('chart-legend').innerHTML = SERIES.map(s =>
  `<div class="legend-item"><span class="legend-swatch" style="background:${s.color}"></span>${s.label}</div>`
).join('');

// Zone table
const zoneTbody = document.getElementById('zone-tbody');
if (!zones?.length) {
  zoneTbody.innerHTML = '<tr><td colspan="6" class="text-muted italic" style="text-align:center;padding:20px">No zones.</td></tr>';
} else {
  zoneTbody.innerHTML = zones.map(z => {
    const over = z.revenue_actual_cents > z.revenue_target_cents;
    const drill = `lines.html?zone=${encodeURIComponent(z.zone_name)}`;
    return `
      <tr onclick="location.href='${drill}'" title="Click to drill into ${z.zone_name} lines" style="cursor:pointer">
        <td class="zone-name">${z.zone_name} <span style="color:var(--muted);font-size:11px;font-weight:400">→ lines</span></td>
        <td class="num">${fmt(z.total_cost_cents)}</td>
        <td class="num">${fmt(z.gp_cents)}</td>
        <td class="num">${fmt(z.revenue_target_cents)}</td>
        <td class="num actual-cell ${over ? 'over' : ''}">${fmt(z.revenue_actual_cents)}</td>
        <td class="num">${pct(z.pct_complete)}</td>
      </tr>
    `;
  }).join('');
}

// ── Drill-down: click or right-click a bar to drill into lines ───
// Power-BI style. Left click = go straight to filtered Lines.
// Right click = context menu with multiple options.
const ctxMenu = (() => {
  const el = document.createElement('div');
  el.style.cssText = 'position:fixed;z-index:9999;background:white;border:1px solid var(--border);border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.18);padding:4px;display:none;min-width:200px;font-size:13px';
  document.body.appendChild(el);
  document.addEventListener('click', () => { el.style.display = 'none'; });
  return el;
})();
function showCtxMenu(x, y, items) {
  ctxMenu.innerHTML = items.map(i => i.divider
    ? `<div style="height:1px;background:var(--border);margin:4px 0"></div>`
    : `<a href="${i.href}" style="display:block;padding:8px 12px;color:var(--gray-700);text-decoration:none;border-radius:5px"
         onmouseover="this.style.background='var(--gray-100)';this.style.color='var(--navy)'"
         onmouseout="this.style.background='';this.style.color='var(--gray-700)'">
         <span style="display:inline-block;width:18px;color:var(--blue)">${i.icon || ''}</span>${i.label}
       </a>`).join('');
  ctxMenu.style.left = x + 'px';
  ctxMenu.style.top  = y + 'px';
  ctxMenu.style.display = 'block';
}

// Shared chart options — built-in legend disabled (we render our own in the sidebar)
const baseOpts = {
  responsive: true, maintainAspectRatio: false,
  onHover: (e, els) => { e.native.target.style.cursor = els.length ? 'pointer' : 'default'; },
  plugins: {
    legend: { display: false },
    tooltip: {
      callbacks: {
        label: c => `${c.dataset.label}: ${c.dataset.label === 'Total Hours' ? c.parsed.y.toFixed(0) + ' h' : '$' + c.parsed.y.toLocaleString()}`,
        afterBody: () => 'click → drill into lines\nright-click → more options',
      },
    },
  },
  scales: {
    y: { beginAtZero: true, ticks: { font: { size: 10 }, callback: v => v >= 1000 ? '$' + (v / 1000).toFixed(0) + 'k' : '$' + v } },
    x: { ticks: { font: { size: 10 } } },
  },
};

// GP$ by Plant — grouped bars per zone, 5 series
const zoneLabels = (zones || []).map(z => z.zone_name);
const chart1Canvas = document.getElementById('chart-gp-by-plant');
const chart1 = new Chart(chart1Canvas.getContext('2d'), {
  type: 'bar',
  data: {
    labels: zoneLabels,
    datasets: [
      { label: SERIES[0].label, data: zones.map(z => +z.total_hours),                 backgroundColor: SERIES[0].color },
      { label: SERIES[1].label, data: zones.map(z => z.total_cost_cents / 100),       backgroundColor: SERIES[1].color },
      { label: SERIES[2].label, data: zones.map(z => z.gp_cents / 100),               backgroundColor: SERIES[2].color },
      { label: SERIES[3].label, data: zones.map(z => z.revenue_target_cents / 100),   backgroundColor: SERIES[3].color },
      { label: SERIES[4].label, data: zones.map(z => z.revenue_actual_cents / 100),   backgroundColor: SERIES[4].color },
    ],
  },
  options: {
    ...baseOpts,
    onClick: (e, els) => {
      if (!els.length) return;
      const zone = zoneLabels[els[0].index];
      location.href = `lines.html?zone=${encodeURIComponent(zone)}`;
    },
  },
});

// Right-click menu on the GP$ by Plant chart
chart1Canvas.addEventListener('contextmenu', (e) => {
  const els = chart1.getElementsAtEventForMode(e, 'nearest', { intersect: true }, false);
  if (!els.length) return;
  e.preventDefault();
  const zone   = zoneLabels[els[0].index];
  const series = chart1.data.datasets[els[0].datasetIndex].label;
  showCtxMenu(e.clientX, e.clientY, [
    { label: `View ${zone} entries`,         icon: '📋', href: `lines.html?zone=${encodeURIComponent(zone)}` },
    { label: `View ${zone} approved only`,   icon: '✓',  href: `lines.html?zone=${encodeURIComponent(zone)}&approved=true` },
    { label: `View ${zone} pending`,         icon: '⌛', href: `lines.html?zone=${encodeURIComponent(zone)}&approved=false` },
    { divider: true },
    { label: `Accounts Payable (all)`,       icon: '💸', href: `ap.html` },
    { label: `Accounts Receivable (all)`,    icon: '💰', href: `ar.html` },
    { divider: true },
    { label: `Edit ${zone} (Admin)`,         icon: '⚙', href: `admin.html` },
  ]);
});

// Total GP$ — project-wide totals
const chart2Canvas = document.getElementById('chart-total');
const chart2 = new Chart(chart2Canvas.getContext('2d'), {
  type: 'bar',
  data: {
    labels: ['Project Total'],
    datasets: [
      { label: SERIES[1].label, data: [totalCost     / 100], backgroundColor: SERIES[1].color },
      { label: SERIES[2].label, data: [totalGp       / 100], backgroundColor: SERIES[2].color },
      { label: SERIES[3].label, data: [totalTarget   / 100], backgroundColor: SERIES[3].color },
      { label: SERIES[4].label, data: [totalRevenue  / 100], backgroundColor: SERIES[4].color },
    ],
  },
  options: {
    ...baseOpts,
    onClick: (_, els) => {
      if (!els.length) return;
      location.href = 'lines.html';
    },
  },
});

chart2Canvas.addEventListener('contextmenu', (e) => {
  const els = chart2.getElementsAtEventForMode(e, 'nearest', { intersect: true }, false);
  if (!els.length) return;
  e.preventDefault();
  const series = chart2.data.datasets[els[0].datasetIndex].label;
  showCtxMenu(e.clientX, e.clientY, [
    { label: `View all lines`,               icon: '📋', href: 'lines.html' },
    { label: `View approved only`,           icon: '✓',  href: 'lines.html?approved=true' },
    { label: `View pending`,                 icon: '⌛', href: 'lines.html?approved=false' },
    { divider: true },
    { label: `Accounts Payable`,             icon: '💸', href: 'ap.html' },
    { label: `Accounts Receivable`,          icon: '💰', href: 'ar.html' },
  ]);
});

const { count } = await sb.from('trakx_entries').select('id', { count: 'exact', head: true }).eq('approved', false);
if (count && count > 0) {
  const b = document.getElementById('pending-banner');
  b.innerHTML = `
    <a href="approve.html" class="card flex items-center gap-3" style="background:var(--amber-bg);border-left:4px solid var(--amber);text-decoration:none">
      <span style="font-size:22px">⚠</span>
      <div>
        <div class="font-semibold" style="color:var(--amber)">${count} pending approval${count > 1 ? 's' : ''}</div>
        <div class="text-xs text-muted">Click to review</div>
      </div>
    </a>`;
  b.hidden = false;
}
</script>
</body>
</html>
