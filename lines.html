<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e3a5f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<link rel="stylesheet" href="assets/projectx.css">
<style>
  /* This page is the canonical "where I can see EVERYTHING" view —
     every entry, every input, every calculated field. Equivalent of
     Smartsheet "01. Summary Database". Nothing hidden, nothing
     bundled behind a single $ figure. */

  .filters { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .filters .field { min-height: 30px; padding: 4px 8px; font-size: 13px; width: auto; min-width: 140px; }
  .filters .field-sm { min-width: 110px; }
  .filters label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); }

  /* Table grows to fit content (each nowrap cell at its natural width),
     and is at least the full width of its scroll container. That way
     the wrapper div's overflow-x kicks in instead of the page. */
  .lines-table { width: max-content; min-width: 100%; border-collapse: collapse; font-size: 12px; }
  /* Belt-and-braces: never let the body itself scroll horizontally
     because of this page — keep all overflow inside the card. */
  html, body { max-width: 100%; overflow-x: hidden; }
  .lines-table thead th {
    background: var(--navy); color: white;
    padding: 6px 8px;
    font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
    text-align: left; white-space: nowrap; cursor: pointer;
    border-bottom: 1px solid rgba(200,169,106,0.55);
  }
  .lines-table thead th.num { text-align: right; }
  .lines-table thead th:hover { background: var(--navy-h); }
  .lines-table thead th .sort-arrow { color: var(--gold); margin-left: 3px; font-size: 9px; }
  .lines-table tbody td {
    padding: 4px 8px;
    border-bottom: 1px solid var(--gray-100);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .lines-table tbody td.wrap { white-space: normal; max-width: 220px; }
  /* Alternating shade BY DATE — every row on the same day shares a
     background so the eye can group them visually. */
  .lines-table tbody tr.dg-a td { background: #e3ebf5; }
  .lines-table tbody tr.dg-b td { background: white; }
  .lines-table tbody tr.dg-a:hover td,
  .lines-table tbody tr.dg-b:hover td { background: #d4e0f0; cursor: pointer; }
  .lines-table tbody tr.expanded td,
  .lines-table tbody tr.detail-row td { background: #fffaf0 !important; }
  .lines-table .num { text-align: right; }
  .lines-table .badge { font-size: 10px; padding: 1px 6px; }
  .lines-table .approved { color: var(--green); font-weight: 600; }
  .lines-table .pending  { color: var(--amber); font-weight: 600; }

  /* Contextual column visibility — when the user filters by a specific
     type (Hours / Materials / Accom), hide columns that aren't relevant. */
  body[data-type-filter="hours"]     .col-mat,
  body[data-type-filter="materials"] .col-hours,
  body[data-type-filter="materials"] .col-labsell,
  body[data-type-filter="materials"] .col-labcost,
  body[data-type-filter="accom"]     .col-hours,
  body[data-type-filter="accom"]     .col-labsell,
  body[data-type-filter="accom"]     .col-labcost,
  body[data-type-filter="accom"]     .col-mat { display: none; }

  .calc-detail {
    background: #fff8e1; border-top: 1px solid rgba(200,169,106,0.55);
    padding: 12px 16px; font-size: 12px;
  }
  .calc-detail h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
  .calc-block { background: white; padding: 8px 10px; border-radius: var(--r); margin-bottom: 8px; border: 1px solid var(--border); }
  .calc-line { display: flex; justify-content: space-between; padding: 2px 0; font-variant-numeric: tabular-nums; }
  .calc-line.total { border-top: 1px solid var(--gray-200); padding-top: 4px; margin-top: 4px; font-weight: 600; color: var(--navy); }
  .calc-formula { font-family: ui-monospace, "Cascadia Code", Menlo, Consolas, monospace; font-size: 11px; color: var(--gray-600); background: var(--gray-50); padding: 4px 6px; border-radius: 4px; margin: 4px 0; }

  .stats-bar {
    background: var(--gray-50); border: 1px solid var(--border); border-radius: var(--r);
    padding: 8px 12px; font-size: 12px; display: flex; flex-wrap: wrap; gap: 16px;
  }
  .stats-bar strong { color: var(--navy); font-variant-numeric: tabular-nums; }

  .calc-link {
    background: var(--gold); color: var(--navy);
    padding: 3px 8px; border-radius: var(--r); font-size: 11px; font-weight: 600;
    text-decoration: none; display: inline-block;
  }
  .calc-link:hover { background: var(--gold-d); color: white; text-decoration: none; }
</style>
</head>
<body data-page="lines" data-version="V1.17">
<script src="assets/nav.js" defer></script>

<main class="container" style="max-width:none;width:100%;padding-left:18px;padding-right:18px">
  <div class="flex items-baseline justify-between mb-3 gap-3">
    <h1>Log</h1>
    <div class="flex items-center gap-2" style="flex-shrink:0">
      <a href="index.html" class="btn btn-ghost btn-sm">← Back</a>
      <button id="export-csv" class="btn btn-secondary btn-sm">Export CSV</button>
    </div>
  </div>

  <div class="card card-tight mb-3 filters">
    <label>From <input id="f-from" type="date" class="field"></label>
    <label>To <input id="f-to" type="date" class="field"></label>
    <label>Zone <select id="f-zone" class="field"><option value="">All zones</option></select></label>
    <label>Person <select id="f-person" class="field"><option value="">All people</option></select></label>
    <label>Company <select id="f-company" class="field"><option value="">All companies</option></select></label>

      <select id="f-type" class="field field-sm">
        <option value="">All</option>
        <option value="hours">Hours</option>
        <option value="materials">Materials</option>
        <option value="accom">Accom</option>
      </select>
    </label>

      <select id="f-approved" class="field field-sm">
        <option value="">Both</option>
        <option value="true">Approved</option>
        <option value="false">Pending</option>
      </select>
    </label>
    <button id="f-clear" class="btn btn-ghost btn-sm">Clear filters</button>
  </div>

  <div class="stats-bar mb-3" id="stats">Loading…</div>

  <div class="card card-tight" style="padding:0;overflow:hidden">
    <div style="overflow-x:auto;width:100%">
    <table class="lines-table" id="lines-tbl">
      <thead>
        <tr>
          <th data-sort="date">Date</th>
          <th data-sort="type">Type</th>
          <th data-sort="person_name">Person</th>
          <th data-sort="company_name">Company</th>
          <th data-sort="zone_name">Zone</th>
          <th class="col-hours">Start</th>
          <th class="col-hours">Finish</th>
          <th class="num col-hours" data-sort="gross_hours">Gross h</th>
          <th class="num col-hours" data-sort="lunch_deduction_hours">Lunch</th>
          <th class="num col-hours" data-sort="day_hours">Day h</th>
          <th class="num col-hours" data-sort="night_hours">Night h</th>
          <th class="num col-hours" data-sort="total_hours">Paid h</th>
          <th class="num col-labcost" data-sort="labour_cost_cents">Lab cost</th>
          <th class="num" data-sort="travel_cost_cents">Travel cost</th>
          <th class="num col-mat" data-sort="materials_cost_cents">Mat cost</th>
          <th class="num" data-sort="total_cost_cents">Total cost</th>
          <th class="num col-labsell" data-sort="labour_sell_cents">Lab sell</th>
          <th class="num" data-sort="sell_price_cents">Sell</th>
          <th class="num" data-sort="profit_cents">Profit</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="lines-tbody">
        <tr><td colspan="20" class="text-muted italic" style="text-align:center;padding:20px">Loading…</td></tr>
      </tbody>
    </table>
    </div>
  </div>

</main>

<script src="assets/projectx-auth.js"></script>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
await window.__projectxReady;
const SUPABASE_URL = 'https://uhodycdbkwocvptiffks.supabase.co';
const sb = createClient(SUPABASE_URL, 'sb_publishable_TKWfAttrdywsm1BOMUMNlw_FjMolZO5');

const fmt  = c => '$' + (Math.round(c / 100)).toLocaleString();
const fmtP = c => (c < 0 ? '-' : '') + '$' + (Math.round(Math.abs(c) / 100)).toLocaleString();
const numh = h => h == null ? '' : (+h).toFixed(2);

let allLines = [];
let allRates = {};        // project rates for showing formula values
let allZones = [];        // {id, name} — for edit form dropdowns
let allPeople = [];       // {id, name} — for edit form dropdowns
let auditByEntry = {};    // entry_id → [{action, actor, actor_source, created_at, changed_fields}, …]
let sortKey  = 'date';
let sortDir  = 'desc';

const $ = id => document.getElementById(id);

// URL pre-filter: ?zone=Whey%20Plant&from=2026-03-01 etc.
const params = new URLSearchParams(location.search);
async function load() {
  // Project + rates so calc breakdown can show the live constants used
  const { data: projects } = await sb.from('projectx_projects').select('id').eq('slug','fonterra-m26').limit(1);
  const project = projects && projects[0];
  if (project) {
    const { data: prArr } = await sb.from('projectx_project_rates').select('*').eq('project_id', project.id).limit(1);
    allRates = (prArr && prArr[0]) || {};
    // Pull full zones + people lists so the edit form has IDs to select from.
    const { data: zoneRows } = await sb.from('projectx_zones').select('id, name').eq('project_id', project.id).eq('status','active').order('display_order');
    allZones = zoneRows || [];
    const { data: links } = await sb.from('projectx_project_people').select('person_id').eq('project_id', project.id);
    const personIds = (links || []).map(l => l.person_id);
    if (personIds.length) {
      const { data: peopleRows } = await sb.from('projectx_people').select('id, name').in('id', personIds).eq('active', true).order('name');
      allPeople = peopleRows || [];
    }
  }

  // Pull all lines
  const { data, error } = await sb.from('v_projectx_line_totals').select('*').limit(5000);
  if (error) {
    $('lines-tbody').innerHTML = `<tr><td colspan="20" class="empty">⚠ ${error.message}</td></tr>`;
    return;
  }
  allLines = data || [];

  // Pull audit history for entries — used in the expanded calc panel to
  // show who did what & when (submit / approve / edit / delete).
  const { data: auditRows } = await sb
    .from('projectx_audit_log')
    .select('row_id, action, actor, actor_source, changed_fields, created_at')
    .eq('table_name', 'projectx_entries')
    .order('id', { ascending: false })
    .limit(5000);
  auditByEntry = {};
  for (const a of (auditRows || [])) {
    (auditByEntry[a.row_id] ||= []).push(a);
  }

  // Populate filter dropdowns
  const zones     = [...new Set(allLines.map(r => r.zone_name))].sort();
  const people    = [...new Set(allLines.map(r => r.person_name))].sort();
  const companies = [...new Set(allLines.map(r => r.company_name))].sort();
  $('f-zone').innerHTML    = '<option value="">All zones</option>'     + zones.map(z => `<option ${params.get('zone')===z?'selected':''}>${z}</option>`).join('');
  $('f-person').innerHTML  = '<option value="">All people</option>'    + people.map(p => `<option ${params.get('person')===p?'selected':''}>${p}</option>`).join('');
  $('f-company').innerHTML = '<option value="">All companies</option>' + companies.map(c => `<option ${params.get('company')===c?'selected':''}>${c}</option>`).join('');
  if (params.get('from'))     $('f-from').value     = params.get('from');
  if (params.get('to'))       $('f-to').value       = params.get('to');
  if (params.get('type'))     $('f-type').value     = params.get('type');
  if (params.get('approved')) $('f-approved').value = params.get('approved');

  render();

  // Deep-link from History page: ?entry=<id> auto-scrolls + expands that row.
  const focusId = params.get('entry');
  if (focusId) {
    const tr = document.querySelector(`tr[data-id="${focusId}"]`);
    if (tr) {
      tr.scrollIntoView({ block: 'center', behavior: 'smooth' });
      tr.click();  // toggles the expanded calc detail
      tr.style.boxShadow = '0 0 0 2px var(--amber)';
      setTimeout(() => { tr.style.boxShadow = ''; }, 2000);
    }
  }
}

function filterRows() {
  const from = $('f-from').value;
  const to   = $('f-to').value;
  const zone = $('f-zone').value;
  const pers = $('f-person').value;
  const co   = $('f-company').value;
  const typ  = $('f-type').value;
  const app  = $('f-approved').value;
  return allLines.filter(r => {
    if (from && r.date < from) return false;
    if (to   && r.date > to)   return false;
    if (zone && r.zone_name    !== zone) return false;
    if (pers && r.person_name  !== pers) return false;
    if (co   && r.company_name !== co)   return false;
    if (typ  && r.type         !== typ)  return false;
    if (app !== '' && String(r.approved) !== app) return false;
    return true;
  });
}

function sortRows(rows) {
  const dir = sortDir === 'asc' ? 1 : -1;
  return [...rows].sort((a, b) => {
    let av = a[sortKey], bv = b[sortKey];
    if (av == null) av = '';
    if (bv == null) bv = '';
    if (typeof av === 'string' && typeof bv === 'string') return av.localeCompare(bv) * dir;
    return (Number(av) - Number(bv)) * dir;
  });
}

function render() {
  // Drive contextual column visibility off the type filter — CSS does
  // the actual hiding via body[data-type-filter="..."] selectors.
  document.body.dataset.typeFilter = $('f-type').value || '';

  const rows = sortRows(filterRows());

  // Stats bar
  const sumCost   = rows.reduce((a, r) => a + r.total_cost_cents, 0);
  const sumSell   = rows.reduce((a, r) => a + r.sell_price_cents, 0);
  const sumProfit = rows.reduce((a, r) => a + r.profit_cents, 0);
  const sumHours  = rows.reduce((a, r) => a + (+r.total_hours || 0), 0);
  const gpPct     = sumSell > 0 ? (100 * sumProfit / sumSell).toFixed(0) : '0';
  $('stats').innerHTML = `
    <span><strong>${rows.length}</strong> rows</span>
    <span>Hours: <strong>${sumHours.toFixed(0)}</strong></span>
    <span>Cost: <strong>${fmt(sumCost)}</strong></span>
    <span>Sell: <strong>${fmt(sumSell)}</strong></span>
    <span>Profit: <strong>${fmtP(sumProfit)}</strong></span>
    <span>CM%: <strong>${gpPct}%</strong></span>
  `;

  // Sort arrows
  document.querySelectorAll('th[data-sort]').forEach(th => {
    const a = th.querySelector('.sort-arrow');
    if (a) a.remove();
    if (th.dataset.sort === sortKey) {
      th.insertAdjacentHTML('beforeend', `<span class="sort-arrow">${sortDir === 'asc' ? '▲' : '▼'}</span>`);
    }
  });

  if (!rows.length) {
    $('lines-tbody').innerHTML = '<tr><td colspan="20" class="empty">No matching rows.</td></tr>';
    return;
  }

  let prevDate = null;
  let groupFlag = false;
  $('lines-tbody').innerHTML = rows.map(r => {
    if (r.date !== prevDate) { groupFlag = !groupFlag; prevDate = r.date; }
    const dgClass = groupFlag ? 'dg-a' : 'dg-b';
    const typeBadge = `<span class="badge badge-${r.type==='hours'?'blue':r.type==='materials'?'gold':'amber'}">${r.type}</span>`;
    const statusBadge = r.approved
      ? `<span class="approved">✓ ${r.approved_by || ''}</span>`
      : `<span class="pending">pending</span>`;
    return `
      <tr class="${dgClass}" data-id="${r.id}">
        <td>${r.date}</td>
        <td>${typeBadge}</td>
        <td>${r.person_name}</td>
        <td>${r.company_name}</td>
        <td>${r.zone_name}</td>
        <td class="col-hours">${r.start_time ? r.start_time.slice(0,5) : ''}</td>
        <td class="col-hours">${r.finish_time ? r.finish_time.slice(0,5) + (r.finish_next_day ? ' +1' : '') : ''}</td>
        <td class="num col-hours">${numh(r.gross_hours)}</td>
        <td class="num col-hours">${r.lunch_deduction_hours > 0 ? '-' + numh(r.lunch_deduction_hours) : ''}</td>
        <td class="num col-hours">${numh(r.day_hours)}</td>
        <td class="num col-hours">${numh(r.night_hours)}</td>
        <td class="num col-hours">${numh(r.total_hours)}</td>
        <td class="num col-labcost">${r.labour_cost_cents ? fmt(r.labour_cost_cents) : ''}</td>
        <td class="num">${r.travel_cost_cents ? fmt(r.travel_cost_cents) : ''}</td>
        <td class="num col-mat">${r.materials_cost_cents ? fmt(r.materials_cost_cents) : ''}</td>
        <td class="num">${fmt(r.total_cost_cents)}</td>
        <td class="num col-labsell">${r.labour_sell_cents ? fmt(r.labour_sell_cents) : ''}</td>
        <td class="num">${fmt(r.sell_price_cents)}</td>
        <td class="num">${fmtP(r.profit_cents)}</td>
        <td>${statusBadge}</td>
      </tr>
    `;
  }).join('');

  document.querySelectorAll('#lines-tbody tr[data-id]').forEach(tr => {
    tr.addEventListener('click', () => toggleDetail(tr, rows.find(x => x.id === tr.dataset.id)));
  });
}

function toggleDetail(tr, r) {
  const next = tr.nextElementSibling;
  if (next && next.classList.contains('detail-row')) {
    next.remove();
    tr.classList.remove('expanded');
    return;
  }
  tr.classList.add('expanded');
  const dayPay   = ((r.labour_cost_cents && r.day_hours)   ? (r.labour_cost_cents / (+r.day_hours + +r.night_hours + .0001)) : 0);
  const breakdown = renderCalcDetail(r);
  tr.insertAdjacentHTML('afterend', `<tr class="detail-row"><td colspan="20" class="calc-detail">${breakdown}</td></tr>`);
}

function renderCalcDetail(r) {
  const blocks = [];

  // Edit + Delete buttons top-right
  blocks.push(`
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-bottom:10px">
      <button class="btn btn-secondary btn-sm" onclick="startEdit('${r.id}')">Edit</button>
      <button class="btn btn-danger btn-sm" onclick="deleteEntry('${r.id}')">Delete</button>
    </div>
  `);

  // Entry inputs
  blocks.push(`
    <h3>Inputs (what the subbie / TL submitted)</h3>
    <div class="calc-block">
      <div class="calc-line"><span>Type</span><span>${r.type}</span></div>
      <div class="calc-line"><span>Date</span><span>${r.date}</span></div>
      <div class="calc-line"><span>Person</span><span>${r.person_name} (${r.company_name})</span></div>
      <div class="calc-line"><span>Zone</span><span>${r.zone_name}</span></div>
      ${r.type === 'hours' ? `
        <div class="calc-line"><span>Start time</span><span>${r.start_time || ''}</span></div>
        <div class="calc-line"><span>Finish time</span><span>${r.finish_time || ''}${r.finish_next_day ? ' (next day)' : ''}</span></div>
        <div class="calc-line"><span>Work description</span><span>${r.work_description || '—'}</span></div>
      ` : ''}
      ${r.type === 'materials' ? `
        <div class="calc-line"><span>Materials</span><span>${r.materials_description || ''}</span></div>
        <div class="calc-line"><span>Material cost (entered)</span><span>${fmt(r.materials_cost_cents || 0)}</span></div>
        <div class="calc-line"><span>PO #</span><span>${r.po_number || ''}</span></div>
      ` : ''}
    </div>
  `);

  // Hours math
  if (r.type === 'hours') {
    blocks.push(`
      <h3>Hours split (NZ Employment Law defaults)</h3>
      <div class="calc-block">
        <div class="calc-formula">gross = finish - start (+24 if next day) = ${numh(r.gross_hours)} h</div>
        <div class="calc-formula">lunch deduction = ${r.lunch_deduction_hours > 0 ? '0.5 h (shift > 5h)' : '0 h (shift &le; 5h)'} = -${numh(r.lunch_deduction_hours || 0)} h</div>
        <div class="calc-formula">paid hours = gross - lunch = ${numh(r.total_hours)} h</div>
        <div class="calc-formula">day window = ${allRates.day_start_hour || 6}:00 - ${allRates.day_end_hour || 18}:00 (per project setting)</div>
        <div class="calc-line"><span>Day hours (paid, scaled)</span><span>${numh(r.day_hours)} h</span></div>
        <div class="calc-line"><span>Night hours (paid, scaled)</span><span>${numh(r.night_hours)} h</span></div>
        <div class="calc-line total"><span>Total paid hours</span><span>${numh(r.total_hours)} h</span></div>
      </div>

      <h3>Labour cost (what we pay the subbie)</h3>
      <div class="calc-block">
        <div class="calc-formula">day_hours &times; day_pay_snapshot + night_hours &times; night_pay_snapshot + total &times; day_pay &times; bonus%</div>
        <div class="calc-line"><span>Day hours &times; pay rate</span><span>${fmt(r.labour_cost_cents - (r.labour_cost_cents - ((+r.day_hours)*(r.labour_cost_cents/Math.max(1,(+r.day_hours)+(+r.night_hours)+(+r.total_hours)*0.05)))))}</span></div>
        <div class="calc-line total"><span>Labour cost</span><span>${fmt(r.labour_cost_cents)}</span></div>
      </div>

      <h3>Labour sell (what we charge the customer)</h3>
      <div class="calc-block">
        <div class="calc-formula">day_hours &times; day_sell + night_hours &times; night_sell (project rates: day $${allRates.day_sell_rate_cents ? (allRates.day_sell_rate_cents/100).toFixed(2) : '?'}, night $${allRates.night_sell_rate_cents ? (allRates.night_sell_rate_cents/100).toFixed(2) : '?'})</div>
        <div class="calc-line total"><span>Labour sell</span><span>${fmt(r.labour_sell_cents)}</span></div>
      </div>
    `);
  }

  // Travel
  if (r.travel_kms != null && r.travel_kms > 0) {
    blocks.push(`
      <h3>Travel</h3>
      <div class="calc-block">
        <div class="calc-formula">cost = travel_kms &times; cost_per_km (${allRates.travel_cost_per_km_cents ? '$' + (allRates.travel_cost_per_km_cents/100).toFixed(2) : '?'}/km)</div>
        <div class="calc-formula">sell = travel_kms &times; sell_per_km (${allRates.travel_sell_per_km_cents ? '$' + (allRates.travel_sell_per_km_cents/100).toFixed(2) : '?'}/km)</div>
        <div class="calc-line"><span>Travel cost</span><span>${fmt(r.travel_cost_cents)}</span></div>
        <div class="calc-line"><span>Travel sell</span><span>${fmt(r.travel_sell_cents)}</span></div>
      </div>
    `);
  }

  // Accom
  if (r.type === 'accom' || r.accom_cost_cents > 0 || r.accom_sell_cents > 0) {
    blocks.push(`
      <h3>Accommodation</h3>
      <div class="calc-block">
        <div class="calc-formula">cost = nights &times; cost_per_night ($${allRates.accom_cost_per_night_cents ? (allRates.accom_cost_per_night_cents/100).toFixed(2) : '0'}/night)</div>
        <div class="calc-formula">sell = nights &times; sell_per_night ($${allRates.accom_sell_per_night_cents ? (allRates.accom_sell_per_night_cents/100).toFixed(2) : '0'}/night)</div>
        <div class="calc-line"><span>Accom cost</span><span>${fmt(r.accom_cost_cents)}</span></div>
        <div class="calc-line"><span>Accom sell</span><span>${fmt(r.accom_sell_cents)}</span></div>
      </div>
    `);
  }

  // Materials sell side
  if (r.type === 'materials') {
    blocks.push(`
      <h3>Materials sell</h3>
      <div class="calc-block">
        <div class="calc-formula">sell = cost &times; (1 + markup% / 100) — current markup ${allRates.materials_markup_pct ?? '0'}%</div>
        <div class="calc-line"><span>Material cost</span><span>${fmt(r.materials_cost_cents || 0)}</span></div>
        <div class="calc-line"><span>Material sell</span><span>${fmt(r.materials_sell_cents || 0)}</span></div>
      </div>
    `);
  }

  // Final totals + internal rule
  blocks.push(`
    <h3>Totals (with internal-staff rule)</h3>
    <div class="calc-block">
      ${r.is_internal ? `<div class="calc-formula" style="color:var(--amber)">Internal staff (${r.company_name}) — 100% CM applied (internal staff cost is overhead, not project P&amp;L).</div>` : ''}
      <div class="calc-line"><span>Total cost</span><span>${fmt(r.total_cost_cents)}</span></div>
      <div class="calc-line"><span>Sell price</span><span>${fmt(r.sell_price_cents)}</span></div>
      <div class="calc-line total"><span>Profit (sell - cost)</span><span>${fmtP(r.profit_cents)}</span></div>
      <div class="calc-line"><span>CM %</span><span>${r.sell_price_cents > 0 ? ((100 * r.profit_cents / r.sell_price_cents).toFixed(1) + '%') : '—'}</span></div>
    </div>

    <h3>Approval &amp; audit</h3>
    <div class="calc-block">
      <div class="calc-line"><span>Approved</span><span>${r.approved ? '✓ by ' + (r.approved_by || '?') + ' on ' + (r.approved_at ? r.approved_at.slice(0,10) : '?') : '— pending'}</span></div>
      <div class="calc-line"><span>Marked paid</span><span>${r.marked_paid ? '✓' : '— payment tracked in NetSuite'}</span></div>
      <div class="calc-line"><span>Entry id</span><span style="font-family:monospace">${r.id}</span></div>
    </div>

    <h3>History (who did what, when)</h3>
    <div class="calc-block">
      ${renderAuditHistory(r.id)}
    </div>
  `);

  return blocks.join('');
}

function renderAuditHistory(entryId) {
  const rows = auditByEntry[entryId] || [];
  if (!rows.length) {
    return '<div class="text-muted text-xs italic">No history recorded (entry pre-dates the audit log, or was seeded directly).</div>';
  }
  // Oldest first reads more naturally as a timeline.
  const ordered = [...rows].reverse();
  return ordered.map(a => {
    const when = (a.created_at || '').replace('T',' ').slice(0,16);
    const actionPretty = ({
      insert: 'submitted',
      approve: 'approved',
      unapprove: 'un-approved',
      'edit (un-approved)': 'edited (un-approved)',
      delete: 'deleted',
    })[a.action] || a.action;
    const source = a.actor_source ? ` <span class="text-muted text-xs">(${a.actor_source})</span>` : '';
    let detail = '';
    if (a.action === 'edit (un-approved)' && a.changed_fields) {
      const keys = Object.keys(a.changed_fields).filter(k =>
        !['modified_at','approved','approved_by','approved_at'].includes(k));
      if (keys.length) detail = `<div class="text-xs text-muted" style="margin-left:8px">changed: ${keys.join(', ')}</div>`;
    }
    return `
      <div class="calc-line" style="align-items:flex-start">
        <span><strong>${a.actor || 'unknown'}</strong> ${actionPretty}${source}${detail}</span>
        <span class="text-muted text-xs" style="font-variant-numeric:tabular-nums">${when}</span>
      </div>
    `;
  }).join('');
}

// Sort handlers
document.querySelectorAll('th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const k = th.dataset.sort;
    if (sortKey === k) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    else { sortKey = k; sortDir = 'asc'; }
    render();
  });
});

// Filter handlers
['f-from','f-to','f-zone','f-person','f-company','f-type','f-approved'].forEach(id => {
  $(id).addEventListener('change', render);
});
$('f-clear').addEventListener('click', () => {
  ['f-from','f-to','f-zone','f-person','f-company','f-type','f-approved'].forEach(id => $(id).value = '');
  render();
});

$('export-csv').addEventListener('click', () => {
  const rows = sortRows(filterRows());
  const cols = ['date','type','person_name','company_name','zone_name','start_time','finish_time','finish_next_day',
                'gross_hours','lunch_deduction_hours','day_hours','night_hours','total_hours',
                'labour_cost_cents','travel_cost_cents','accom_cost_cents','materials_cost_cents','equipment_cost_cents','total_cost_cents',
                'labour_sell_cents','travel_sell_cents','accom_sell_cents','materials_sell_cents','equipment_sell_cents','sell_price_cents',
                'profit_cents','approved','approved_by','marked_paid','work_description','materials_description','po_number','id'];
  const csv = [cols.join(',')].concat(rows.map(r => cols.map(c => {
    let v = r[c]; if (v === null || v === undefined) v = '';
    if (typeof v === 'string' && (v.includes(',') || v.includes('"'))) v = `"${v.replace(/"/g,'""')}"`;
    return v;
  }).join(','))).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `projectx-lines-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
});

// ── Edit + Delete an entry ─────────────────────────────────────────
function buildTimeOptionsHtml(selected) {
  const opts = ['<option value="">—</option>'];
  for (let h = 0; h < 24; h++) {
    for (let m = 0; m < 60; m += 15) {
      const v = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
      opts.push(`<option value="${v}" ${selected && selected.startsWith(v) ? 'selected' : ''}>${v}</option>`);
    }
  }
  return opts.join('');
}

function renderEditForm(r) {
  const zoneOpts   = allZones.map(z =>  `<option value="${z.id}" ${z.id === r.zone_id ? 'selected':''}>${z.name}</option>`).join('');
  const personOpts = allPeople.map(p => `<option value="${p.id}" ${p.id === r.person_id ? 'selected':''}>${p.name}</option>`).join('');
  const typeOpts   = ['hours','materials','accom'].map(t => `<option value="${t}" ${t === r.type ? 'selected':''}>${t}</option>`).join('');
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <h3 style="margin:0">Edit entry</h3>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary btn-sm" onclick="cancelEdit('${r.id}')">Cancel</button>
        <button class="btn btn-primary btn-sm" onclick="saveEdit('${r.id}')">Save</button>
      </div>
    </div>
    <p class="text-muted text-xs" style="margin-bottom:12px">Saving will un-approve this entry. A PM needs to re-approve it on the Approve page.</p>
    <div class="calc-block" style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px 14px">
      <label style="display:flex;flex-direction:column;gap:3px"><span class="text-xs text-muted">Type</span>
        <select id="e-type-${r.id}" class="field">${typeOpts}</select></label>
      <label style="display:flex;flex-direction:column;gap:3px"><span class="text-xs text-muted">Date</span>
        <input id="e-date-${r.id}" type="date" class="field" value="${r.date || ''}"></label>
      <label style="display:flex;flex-direction:column;gap:3px"><span class="text-xs text-muted">Zone</span>
        <select id="e-zone-${r.id}" class="field">${zoneOpts}</select></label>
      <label style="display:flex;flex-direction:column;gap:3px"><span class="text-xs text-muted">Person</span>
        <select id="e-person-${r.id}" class="field">${personOpts}</select></label>
      <label style="display:flex;flex-direction:column;gap:3px"><span class="text-xs text-muted">Start time</span>
        <select id="e-start-${r.id}" class="field">${buildTimeOptionsHtml(r.start_time)}</select></label>
      <label style="display:flex;flex-direction:column;gap:3px"><span class="text-xs text-muted">Finish time</span>
        <select id="e-finish-${r.id}" class="field">${buildTimeOptionsHtml(r.finish_time)}</select></label>
      <label style="grid-column:1/-1;display:flex;flex-direction:column;gap:3px"><span class="text-xs text-muted">Work description</span>
        <textarea id="e-work-${r.id}" class="field" rows="2">${r.work_description || ''}</textarea></label>
      <label style="grid-column:1/-1;display:flex;flex-direction:column;gap:3px"><span class="text-xs text-muted">Materials description</span>
        <textarea id="e-matdesc-${r.id}" class="field" rows="2">${r.materials_description || ''}</textarea></label>
      <label style="display:flex;flex-direction:column;gap:3px"><span class="text-xs text-muted">Material cost ($)</span>
        <input id="e-matcost-${r.id}" type="number" step="0.01" class="field num" value="${r.materials_cost_cents ? (r.materials_cost_cents/100).toFixed(2) : ''}"></label>
      <label style="display:flex;flex-direction:column;gap:3px"><span class="text-xs text-muted">PO #</span>
        <input id="e-po-${r.id}" type="text" class="field" value="${r.po_number || ''}"></label>
      <label style="display:flex;flex-direction:column;gap:3px"><span class="text-xs text-muted">Accom nights</span>
        <input id="e-nights-${r.id}" type="number" min="0" class="field num" value="${r.accom_nights || 0}"></label>
      <label style="display:flex;flex-direction:column;gap:3px"><span class="text-xs text-muted">Travel km</span>
        <input id="e-kms-${r.id}" type="number" min="0" step="0.1" class="field num" value="${r.travel_kms || ''}"></label>
      <label style="grid-column:1/-1;display:flex;flex-direction:column;gap:3px"><span class="text-xs text-muted">Comments</span>
        <input id="e-comments-${r.id}" type="text" class="field" value="${(r.comments || '').replace(/"/g,'&quot;')}"></label>
    </div>
    <div id="e-msg-${r.id}" class="text-xs mt-2"></div>
  `;
}

window.startEdit = function (id) {
  const r = allLines.find(x => x.id === id);
  if (!r) return;
  const tr = document.querySelector(`tr[data-id="${id}"]`);
  const detail = tr && tr.nextElementSibling;
  if (detail && detail.classList.contains('detail-row')) {
    detail.querySelector('.calc-detail').innerHTML = renderEditForm(r);
  }
};

window.cancelEdit = function (id) {
  const r = allLines.find(x => x.id === id);
  if (!r) return;
  const tr = document.querySelector(`tr[data-id="${id}"]`);
  const detail = tr && tr.nextElementSibling;
  if (detail && detail.classList.contains('detail-row')) {
    detail.querySelector('.calc-detail').innerHTML = renderCalcDetail(r);
  }
};

window.saveEdit = async function (id) {
  const msg = document.getElementById(`e-msg-${id}`);
  msg.textContent = 'Saving…'; msg.className = 'text-xs text-muted mt-2';
  const startT  = document.getElementById(`e-start-${id}`).value;
  const finishT = document.getElementById(`e-finish-${id}`).value;
  const payload = {
    op: 'update_entry',
    entry_id: id,
    type:                 document.getElementById(`e-type-${id}`).value,
    date:                 document.getElementById(`e-date-${id}`).value || null,
    zone_id:              document.getElementById(`e-zone-${id}`).value || null,
    person_id:            document.getElementById(`e-person-${id}`).value || null,
    start_time:           startT || null,
    finish_time:          finishT || null,
    finish_next_day:      !!(startT && finishT && finishT < startT),
    work_description:     document.getElementById(`e-work-${id}`).value || null,
    materials_description:document.getElementById(`e-matdesc-${id}`).value || null,
    materials_cost_cents: document.getElementById(`e-matcost-${id}`).value
                          ? Math.round(parseFloat(document.getElementById(`e-matcost-${id}`).value) * 100)
                          : null,
    po_number:            document.getElementById(`e-po-${id}`).value || null,
    accom_nights:         parseInt(document.getElementById(`e-nights-${id}`).value, 10) || null,
    travel_kms:           document.getElementById(`e-kms-${id}`).value
                          ? parseFloat(document.getElementById(`e-kms-${id}`).value)
                          : null,
    comments:             document.getElementById(`e-comments-${id}`).value || null,
  };
  try {
    const r = await fetch(`${SUPABASE_URL}/functions/v1/projectx-admin`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const body = await r.json();
    if (!body.ok) throw new Error(body.error || `HTTP ${r.status}`);
    msg.textContent = '✓ Saved — reloading';
    await load();
    render();
  } catch (e) {
    msg.textContent = '⚠ ' + e.message;
    msg.className = 'text-xs text-red mt-2';
  }
};

window.deleteEntry = async function (id) {
  if (!confirm('Delete this entry permanently? This cannot be undone.')) return;
  try {
    const r = await fetch(`${SUPABASE_URL}/functions/v1/projectx-admin`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ op: 'delete_entry', entry_id: id }),
    });
    const body = await r.json();
    if (!body.ok) throw new Error(body.error || `HTTP ${r.status}`);
    await load();
    render();
  } catch (e) {
    alert('Delete failed: ' + e.message);
  }
};

load();
</script>
